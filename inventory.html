<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plus One · Inventory">
<meta name="theme-color" content="#08182b">
<title>Plus One · Inventory</title>
<style>
  :root {
    --bg: #08182b;
    --surface: #0f2740;
    --surface2: #162f4a;
    --border: #1e3f5c;
    --accent: #2a7ff5;
    --accent2: #1a6ad4;
    --text: #e8f0fe;
    --text2: #8aadcc;
    --text3: #567494;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a855f7;
    --radius: 10px;
    --radius-sm: 6px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-brand { font-weight: 700; font-size: 17px; color: var(--text); flex: 1; }
  .nav-brand span { color: var(--text2); font-weight: 400; font-size: 14px; }
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(var(--safe-bottom) + 6px);
    display: flex;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 10px; padding: 4px 0; transition: color .15s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn .icon { font-size: 20px; }
  .main {
    padding-top: calc(var(--safe-top) + 58px);
    padding-bottom: calc(var(--safe-bottom) + 70px);
    min-height: 100%;
  }

  /* SECTIONS */
  .section { display: none; padding: 12px 14px; }
  .section.active { display: block; }

  /* SEARCH / FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 160px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .search-box::placeholder { color: var(--text3); }
  .filter-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--text2);
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pills-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; }
  .pills-row::-webkit-scrollbar { display: none; }

  /* CARDS GRID */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: border-color .15s, transform .1s;
    display: flex; flex-direction: column;
  }
  .item-card:active { transform: scale(.98); }
  .item-card:hover { border-color: var(--accent); }
  .card-img {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: var(--text3);
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-cat { font-size: 11px; color: var(--text3); }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .credit-badge {
    background: var(--accent); color: #fff; border-radius: 20px;
    padding: 2px 8px; font-size: 12px; font-weight: 700;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 4px;
  }
  .status-available .status-dot { background: var(--green); }
  .status-assigned .status-dot { background: var(--amber); }
  .status-ordered .status-dot { background: var(--purple); }
  .status-label { font-size: 11px; color: var(--text2); }

  /* LIST VIEW */
  .list-view .item-card { flex-direction: row; height: 68px; }
  .list-view .card-img { width: 68px; height: 68px; aspect-ratio: unset; flex-shrink: 0; font-size: 24px; }
  .list-view .card-body { flex-direction: row; align-items: center; padding: 8px 10px; gap: 8px; }
  .list-view .card-name { flex: 1; font-size: 14px; }
  .list-view .card-footer { flex-direction: column; align-items: flex-end; gap: 4px; margin: 0; }

  /* SECTION HEADER */
  .sec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .sec-title { font-size: 19px; font-weight: 700; flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s;
  }
  .btn:active { background: var(--accent2); }
  .btn-ghost {
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  }
  .btn-ghost:active { background: var(--border); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--red); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text2); cursor: pointer; padding: 6px 9px; font-size: 14px; transition: all .15s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 600px; max-height: 92vh;
    overflow-y: auto; padding: 20px 18px calc(var(--safe-bottom) + 20px);
    transform: translateY(30px); transition: transform .2s;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text);
    font-size: 14px; outline: none; transition: border-color .15s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-select option { background: var(--surface2); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .credit-preview {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;
  }
  .credit-preview .label { font-size: 12px; color: var(--text2); }
  .credit-preview .value { font-size: 20px; font-weight: 800; color: var(--accent); }
  .credit-preview .sub { font-size: 11px; color: var(--text3); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* PHOTO UPLOAD */
  .photo-upload {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center; cursor: pointer;
    transition: border-color .15s; position: relative; overflow: hidden;
  }
  .photo-upload:hover { border-color: var(--accent); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload .preview { font-size: 12px; color: var(--text2); margin-top: 6px; }
  .photo-thumb {
    width: 100%; max-height: 180px; object-fit: cover;
    border-radius: var(--radius-sm); display: block;
  }

  /* ITEM DETAIL */
  .detail-img {
    width: 100%; max-height: 220px; object-fit: cover;
    border-radius: var(--radius); margin-bottom: 16px;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-size: 60px; min-height: 140px;
  }
  .detail-img img { width: 100%; height: 220px; object-fit: cover; border-radius: var(--radius); }
  .detail-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .detail-cat { font-size: 13px; color: var(--text3); margin-bottom: 14px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-cell { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
  .detail-cell .lbl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .detail-cell .val { font-size: 15px; font-weight: 600; }
  .detail-cell .val.big { font-size: 22px; color: var(--accent); }
  .assign-section { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px; }
  .assign-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .tenant-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    transition: all .15s; margin: 4px;
  }
  .tenant-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tenant-chip.over-budget { opacity: .45; cursor: not-allowed; }

  /* TENANTS SECTION */
  .tenant-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .tenant-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .tenant-info { flex: 1; }
  .tenant-name { font-size: 15px; font-weight: 600; }
  .tenant-unit { font-size: 12px; color: var(--text3); }
  .tenant-credits { text-align: right; }
  .credit-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .credit-used { font-size: 11px; color: var(--text3); }
  .tenant-items-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .tiny-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text2); }
  .tiny-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }

  /* SETTINGS */
  .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .settings-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .setting-row label { flex: 1; font-size: 14px; }
  .setting-row .form-input { flex: 0 0 90px; text-align: right; }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px; white-space: nowrap;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-chip .sv { font-size: 18px; font-weight: 800; }
  .stat-chip .sl { font-size: 11px; color: var(--text3); }
  .stat-chip.blue .sv { color: var(--accent); }
  .stat-chip.green .sv { color: var(--green); }
  .stat-chip.amber .sv { color: var(--amber); }
  .stat-chip.purple .sv { color: var(--purple); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* TAG */
  .tag {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .tag-available { background: rgba(34,197,94,.15); color: var(--green); }
  .tag-assigned { background: rgba(245,158,11,.15); color: var(--amber); }
  .tag-ordered { background: rgba(168,85,247,.15); color: var(--purple); }

  /* LOCATION BADGE */
  .loc-badge {
    background: var(--surface2); border-radius: 4px;
    padding: 2px 7px; font-size: 11px; color: var(--text2);
    display: inline-block;
  }

  /* SCROLLABLE CHIPS */
  .chips-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .chips-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">📦 Plus One <span>· Inventory</span></div>
</nav>

<div class="main">

  <!-- INVENTORY SECTION -->
  <div class="section active" id="sec-inventory">
    <div class="sec-header">
      <div class="sec-title">Inventory</div>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
        <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
      </div>
      <button class="btn" onclick="openAddItem()">＋ Add</button>
    </div>

    <div id="stats-bar" class="stats-bar"></div>

    <div class="filter-bar">
      <input class="search-box" id="search-inv" placeholder="🔍  Search items…" oninput="renderInventory()">
    </div>

    <div class="chips-scroll" id="cat-pills" style="margin-bottom:12px"></div>

    <div id="inv-cards" class="cards-grid"></div>
  </div>

  <!-- TENANTS SECTION -->
  <div class="section" id="sec-tenants">
    <div class="sec-header">
      <div class="sec-title">Tenants & Credits</div>
      <button class="btn" onclick="openAddTenant()">＋ Tenant</button>
    </div>
    <div id="tenant-list"></div>
  </div>

  <!-- AVAILABLE SECTION -->
  <div class="section" id="sec-available">
    <div class="sec-header">
      <div class="sec-title">Browse Items</div>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Viewing as tenant</label>
      <select class="form-select" id="tenant-selector" onchange="renderAvailable()">
        <option value="">— select tenant —</option>
      </select>
    </div>
    <div id="tenant-budget-bar"></div>
    <div class="chips-scroll" id="avail-pills" style="margin-bottom:12px"></div>
    <div id="avail-cards" class="cards-grid"></div>
  </div>

  <!-- SETTINGS SECTION -->
  <div class="section" id="sec-settings">
    <div class="sec-header">
      <div class="sec-title">Settings</div>
    </div>
    <div class="settings-card">
      <div class="settings-title">Credit Calculation</div>
      <div class="setting-row">
        <label>Annual interest rate (%)</label>
        <input class="form-input" id="set-rate" type="number" step="0.1" value="24" oninput="saveSettings()">
      </div>
      <div class="setting-row">
        <label>Amortization (months)</label>
        <input class="form-input" id="set-months" type="number" value="36" oninput="saveSettings()">
      </div>
      <div class="setting-row">
        <label>1 credit = (֏/month)</label>
        <input class="form-input" id="set-unit" type="number" value="1000" oninput="saveSettings()">
      </div>
      <div class="credit-preview" style="margin-top:12px">
        <div>
          <div class="label">Example: 120,000 ֏ item</div>
          <div class="sub" id="set-preview-sub">monthly payment</div>
        </div>
        <div style="text-align:right">
          <div class="value" id="set-preview-credits">—</div>
          <div class="sub">credits</div>
        </div>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-title">Data</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Export JSON</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">⬆ Import JSON</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑 Clear All</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

</div><!-- /main -->

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-inventory" onclick="switchTab('inventory')">
    <span class="icon">📦</span>Inventory
  </button>
  <button class="tab-btn" id="tab-tenants" onclick="switchTab('tenants')">
    <span class="icon">👥</span>Tenants
  </button>
  <button class="tab-btn" id="tab-available" onclick="switchTab('available')">
    <span class="icon">🛒</span>Browse
  </button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
    <span class="icon">⚙️</span>Settings
  </button>
</nav>

<!-- ITEM MODAL (Add / Edit) -->
<div class="modal-backdrop" id="item-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">Add Item</div>

    <div class="form-group">
      <label class="form-label">Photo</label>
      <div class="photo-upload" id="photo-drop">
        <input type="file" accept="image/*" id="photo-input" onchange="handlePhoto(event)">
        <div id="photo-preview-wrap">
          <div style="font-size:32px">📷</div>
          <div class="preview">Tap to add photo</div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Item name *</label>
        <input class="form-input" id="f-name" placeholder="e.g. Ergonomic Chair">
      </div>
      <div class="form-group">
        <label class="form-label">Brand / Model</label>
        <input class="form-input" id="f-brand" placeholder="e.g. IKEA Markus">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-select" id="f-cat">
          <option value="">— pick —</option>
          <option>Furniture</option>
          <option>Electronics</option>
          <option>Plants</option>
          <option>Heating</option>
          <option>Cooling</option>
          <option>Internet</option>
          <option>Blinds / Жалюзи</option>
          <option>Lighting</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="available">Available</option>
          <option value="assigned">Assigned</option>
          <option value="ordered">Ordered</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Price (֏) *</label>
      <input class="form-input" id="f-price" type="number" placeholder="120000" oninput="updateCreditPreview()">
      <div class="credit-preview" id="credit-preview" style="margin-top:10px">
        <div>
          <div class="label">Monthly payment</div>
          <div class="sub" id="preview-monthly">enter price above</div>
        </div>
        <div style="text-align:right">
          <div class="value" id="preview-credits">—</div>
          <div class="sub">credits</div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Floor</label>
        <input class="form-input" id="f-floor" placeholder="e.g. 3">
      </div>
      <div class="form-group">
        <label class="form-label">Wing</label>
        <input class="form-input" id="f-wing" placeholder="e.g. A">
      </div>
      <div class="form-group">
        <label class="form-label">Unit / Room</label>
        <input class="form-input" id="f-unit" placeholder="e.g. 301">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Color, condition, serial number…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('item-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="btn-delete-item" onclick="deleteCurrentItem()" style="display:none">🗑</button>
      <button class="btn" onclick="saveItem()">💾 Save</button>
    </div>
  </div>
</div>

<!-- ITEM DETAIL MODAL -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')">Close</button>
      <button class="btn" id="btn-edit-item" onclick="editCurrentItem()">✏️ Edit</button>
    </div>
  </div>
</div>

<!-- TENANT MODAL -->
<div class="modal-backdrop" id="tenant-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="tenant-modal-title">Add Tenant</div>
    <div class="form-group">
      <label class="form-label">Tenant name *</label>
      <input class="form-input" id="t-name" placeholder="e.g. Hakobyan & Partners">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Floor</label>
        <input class="form-input" id="t-floor" placeholder="3">
      </div>
      <div class="form-group">
        <label class="form-label">Wing</label>
        <input class="form-input" id="t-wing" placeholder="A">
      </div>
      <div class="form-group">
        <label class="form-label">Unit</label>
        <input class="form-input" id="t-unit" placeholder="301">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Credit balance (credits)</label>
      <input class="form-input" id="t-credits" type="number" value="10" placeholder="10">
      <div style="font-size:12px;color:var(--text3);margin-top:5px" id="t-credit-amd">= 10,000 ֏/month purchasing power</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('tenant-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="btn-delete-tenant" onclick="deleteCurrentTenant()" style="display:none">🗑</button>
      <button class="btn" onclick="saveTenant()">💾 Save</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

let items = LS.get('inv_items') || [];
let tenants = LS.get('inv_tenants') || [];
let settings = LS.get('inv_settings') || { rate: 24, months: 36, unit: 1000 };
let currentView = 'grid';
let currentItemId = null;
let currentTenantId = null;
let currentPhoto = null;
let activeCatFilter = 'All';
let activeAvailFilter = 'All';

const CATEGORIES = ['Furniture','Electronics','Plants','Heating','Cooling','Internet','Blinds / Жалюзи','Lighting','Other'];
const CAT_ICONS = {
  'Furniture':'🪑','Electronics':'💻','Plants':'🌿','Heating':'🔥',
  'Cooling':'❄️','Internet':'📶','Blinds / Жалюзи':'🪟','Lighting':'💡','Other':'📦'
};
const STATUS_LABELS = { available:'Available', assigned:'Assigned', ordered:'Ordered' };

// ─── CREDIT MATH ────────────────────────────────────────────────────────
function monthlyPayment(price) {
  const r = settings.rate / 12 / 100;
  const n = settings.months;
  if (!price || price <= 0) return 0;
  if (r === 0) return price / n;
  return price * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
}
function priceToCredits(price) {
  return Math.ceil(monthlyPayment(price) / settings.unit);
}
function fmtAmd(n) { return Math.round(n).toLocaleString('hy-AM') + ' ֏'; }

// ─── TABS ────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'inventory') renderInventory();
  if (name === 'tenants') renderTenants();
  if (name === 'available') renderAvailable();
  if (name === 'settings') renderSettings();
}

// ─── SETTINGS ────────────────────────────────────────────────────────────
function saveSettings() {
  settings.rate = parseFloat(document.getElementById('set-rate').value) || 24;
  settings.months = parseInt(document.getElementById('set-months').value) || 36;
  settings.unit = parseInt(document.getElementById('set-unit').value) || 1000;
  LS.set('inv_settings', settings);
  renderSettings();
}
function renderSettings() {
  document.getElementById('set-rate').value = settings.rate;
  document.getElementById('set-months').value = settings.months;
  document.getElementById('set-unit').value = settings.unit;
  const monthly = monthlyPayment(120000);
  const credits = priceToCredits(120000);
  document.getElementById('set-preview-sub').textContent = fmtAmd(monthly) + '/month';
  document.getElementById('set-preview-credits').textContent = credits;
}

// ─── INVENTORY ───────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  renderInventory();
}

function renderInventory() {
  const q = (document.getElementById('search-inv').value || '').toLowerCase();
  // Category pills
  const allCats = ['All', ...CATEGORIES];
  const pillsEl = document.getElementById('cat-pills');
  pillsEl.innerHTML = allCats.map(c =>
    `<button class="filter-pill${activeCatFilter===c?' active':''}" onclick="activeCatFilter='${c}';renderInventory()">${c==='All'?'All':(CAT_ICONS[c]||'')+ ' '+c}</button>`
  ).join('');

  let filtered = items.filter(it => {
    const matchQ = !q || it.name.toLowerCase().includes(q) || (it.brand||'').toLowerCase().includes(q) || (it.notes||'').toLowerCase().includes(q);
    const matchCat = activeCatFilter === 'All' || it.category === activeCatFilter;
    return matchQ && matchCat;
  });

  // Stats
  const statsEl = document.getElementById('stats-bar');
  statsEl.innerHTML = `
    <div class="stat-chip blue"><span class="sv">${items.length}</span><span class="sl">Total items</span></div>
    <div class="stat-chip green"><span class="sv">${items.filter(i=>i.status==='available').length}</span><span class="sl">Available</span></div>
    <div class="stat-chip amber"><span class="sv">${items.filter(i=>i.status==='assigned').length}</span><span class="sl">Assigned</span></div>
    <div class="stat-chip purple"><span class="sv">${items.filter(i=>i.status==='ordered').length}</span><span class="sl">Ordered</span></div>
  `;

  const grid = document.getElementById('inv-cards');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>No items found</p></div>';
    grid.className = '';
    return;
  }
  grid.className = currentView === 'grid' ? 'cards-grid' : 'cards-grid list-view';
  grid.innerHTML = filtered.map(it => itemCard(it)).join('');
}

function itemCard(it) {
  const credits = priceToCredits(it.price);
  const imgHtml = it.photo
    ? `<div class="card-img"><img src="${it.photo}" alt=""></div>`
    : `<div class="card-img">${CAT_ICONS[it.category]||'📦'}</div>`;
  const loc = [it.floor ? 'Fl '+it.floor : '', it.wing||'', it.unit||''].filter(Boolean).join(' · ');
  return `
    <div class="item-card" onclick="openDetail('${it.id}')">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${it.name}</div>
        <div class="card-cat">${it.category||''}${it.brand?' · '+it.brand:''}</div>
        ${loc ? `<div class="loc-badge" style="margin-top:2px;font-size:10px">${loc}</div>` : ''}
        <div class="card-footer">
          <span class="credit-badge">${credits}cr</span>
          <span class="status-${it.status||'available'}">
            <span class="status-dot"></span>
            <span class="status-label">${STATUS_LABELS[it.status]||'Available'}</span>
          </span>
        </div>
      </div>
    </div>`;
}

// ─── ITEM DETAIL ──────────────────────────────────────────────────────────
function openDetail(id) {
  currentItemId = id;
  const it = items.find(i => i.id === id);
  if (!it) return;
  const credits = priceToCredits(it.price);
  const monthly = monthlyPayment(it.price);
  const loc = [it.floor ? 'Floor '+it.floor : '', it.wing ? 'Wing '+it.wing : '', it.unit||''].filter(Boolean).join(' · ');
  const assignedTenant = tenants.find(t => (t.items||[]).includes(id));

  let assignSection = `<div class="assign-section">
    <div class="assign-label">Assign to tenant</div>
    <div>`;
  tenants.forEach(t => {
    const used = (t.items||[]).reduce((s, iid) => { const ii = items.find(x=>x.id===iid); return s + (ii?priceToCredits(ii.price):0); }, 0);
    const remaining = (t.credits||0) - used;
    const isAssigned = (t.items||[]).includes(id);
    const wouldOver = !isAssigned && credits > remaining;
    assignSection += `<span class="tenant-chip${isAssigned?' selected':''}${wouldOver?' over-budget':''}"
      onclick="${wouldOver?'':("toggleAssign('"+t.id+"','"+id+"')")}">${t.name}<small style="opacity:.6;margin-left:4px">${remaining}cr left</small></span>`;
  });
  assignSection += `</div></div>`;

  document.getElementById('detail-content').innerHTML = `
    ${it.photo ? `<div class="detail-img"><img src="${it.photo}" alt=""></div>` : `<div class="detail-img">${CAT_ICONS[it.category]||'📦'}</div>`}
    <div class="detail-name">${it.name}</div>
    <div class="detail-cat">${it.category||''}${it.brand ? ' · ' + it.brand : ''}${loc ? ' · ' + loc : ''}</div>
    <div class="detail-grid">
      <div class="detail-cell">
        <div class="lbl">Price</div>
        <div class="val">${fmtAmd(it.price)}</div>
      </div>
      <div class="detail-cell">
        <div class="lbl">Credits</div>
        <div class="val big">${credits}cr</div>
      </div>
      <div class="detail-cell">
        <div class="lbl">Monthly payment</div>
        <div class="val">${fmtAmd(monthly)}</div>
      </div>
      <div class="detail-cell">
        <div class="lbl">Status</div>
        <div class="val"><span class="tag tag-${it.status||'available'}">${STATUS_LABELS[it.status]||'Available'}</span></div>
      </div>
    </div>
    ${it.notes ? `<div style="color:var(--text2);font-size:13px;margin-bottom:14px">${it.notes}</div>` : ''}
    ${assignedTenant ? `<div style="margin-bottom:10px;font-size:13px;color:var(--amber)">⚡ Assigned to <strong>${assignedTenant.name}</strong></div>` : ''}
    ${tenants.length ? assignSection : ''}
  `;
  openModal('detail-modal');
}

function toggleAssign(tenantId, itemId) {
  const t = tenants.find(x => x.id === tenantId);
  if (!t) return;
  if (!t.items) t.items = [];
  // Remove from all tenants first
  tenants.forEach(tn => { if (tn.items) tn.items = tn.items.filter(i => i !== itemId); });
  // Assign if not already
  if (!t.items.includes(itemId)) {
    t.items.push(itemId);
    const it = items.find(x => x.id === itemId);
    if (it) it.status = 'assigned';
  } else {
    const it = items.find(x => x.id === itemId);
    if (it) it.status = 'available';
  }
  LS.set('inv_items', items);
  LS.set('inv_tenants', tenants);
  openDetail(itemId); // refresh
}

function editCurrentItem() {
  closeModal('detail-modal');
  openAddItem(currentItemId);
}

// ─── ADD / EDIT ITEM ──────────────────────────────────────────────────────
function openAddItem(id) {
  currentItemId = id || null;
  currentPhoto = null;
  const it = id ? items.find(i => i.id === id) : null;
  document.getElementById('item-modal-title').textContent = it ? 'Edit Item' : 'Add Item';
  document.getElementById('f-name').value = it?.name || '';
  document.getElementById('f-brand').value = it?.brand || '';
  document.getElementById('f-cat').value = it?.category || '';
  document.getElementById('f-status').value = it?.status || 'available';
  document.getElementById('f-price').value = it?.price || '';
  document.getElementById('f-floor').value = it?.floor || '';
  document.getElementById('f-wing').value = it?.wing || '';
  document.getElementById('f-unit').value = it?.unit || '';
  document.getElementById('f-notes').value = it?.notes || '';
  document.getElementById('btn-delete-item').style.display = it ? 'inline-flex' : 'none';
  currentPhoto = it?.photo || null;
  // Photo preview
  const wrap = document.getElementById('photo-preview-wrap');
  if (currentPhoto) {
    wrap.innerHTML = `<img class="photo-thumb" src="${currentPhoto}">`;
  } else {
    wrap.innerHTML = `<div style="font-size:32px">📷</div><div class="preview">Tap to add photo</div>`;
  }
  updateCreditPreview();
  openModal('item-modal');
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentPhoto = ev.target.result;
    document.getElementById('photo-preview-wrap').innerHTML = `<img class="photo-thumb" src="${currentPhoto}">`;
  };
  reader.readAsDataURL(file);
}

function updateCreditPreview() {
  const price = parseFloat(document.getElementById('f-price').value);
  if (!price || price <= 0) {
    document.getElementById('preview-credits').textContent = '—';
    document.getElementById('preview-monthly').textContent = 'enter price above';
    return;
  }
  const monthly = monthlyPayment(price);
  const credits = priceToCredits(price);
  document.getElementById('preview-credits').textContent = credits;
  document.getElementById('preview-monthly').textContent = fmtAmd(monthly) + '/month';
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const price = parseFloat(document.getElementById('f-price').value);
  if (!name) { alert('Item name is required'); return; }
  if (!cat) { alert('Category is required'); return; }
  if (!price || price <= 0) { alert('Valid price is required'); return; }

  const data = {
    name,
    brand: document.getElementById('f-brand').value.trim(),
    category: cat,
    status: document.getElementById('f-status').value,
    price,
    floor: document.getElementById('f-floor').value.trim(),
    wing: document.getElementById('f-wing').value.trim(),
    unit: document.getElementById('f-unit').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    photo: currentPhoto,
  };

  if (currentItemId) {
    const idx = items.findIndex(i => i.id === currentItemId);
    if (idx !== -1) items[idx] = { ...items[idx], ...data };
  } else {
    data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    items.push(data);
  }
  LS.set('inv_items', items);
  closeModal('item-modal');
  renderInventory();
}

function deleteCurrentItem() {
  if (!confirm('Delete this item?')) return;
  // Remove from tenant assignments too
  tenants.forEach(t => { if (t.items) t.items = t.items.filter(i => i !== currentItemId); });
  items = items.filter(i => i.id !== currentItemId);
  LS.set('inv_items', items);
  LS.set('inv_tenants', tenants);
  closeModal('item-modal');
  renderInventory();
}

// ─── TENANTS ──────────────────────────────────────────────────────────────
function renderTenants() {
  const el = document.getElementById('tenant-list');
  if (!tenants.length) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">👤</div><p>No tenants yet</p></div>';
    return;
  }
  el.innerHTML = tenants.map(t => {
    const assigned = (t.items||[]).map(id => items.find(i=>i.id===id)).filter(Boolean);
    const usedCredits = assigned.reduce((s,it) => s + priceToCredits(it.price), 0);
    const initials = (t.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const loc = [t.floor?'Fl '+t.floor:'', t.wing||'', t.unit||''].filter(Boolean).join(' · ');
    return `
      <div class="tenant-card" onclick="openEditTenant('${t.id}')">
        <div class="tenant-avatar">${initials}</div>
        <div class="tenant-info">
          <div class="tenant-name">${t.name}</div>
          <div class="tenant-unit">${loc}</div>
          ${assigned.length ? `<div class="tenant-items-list">${assigned.map(it=>`<div class="tiny-item"><span class="tiny-dot"></span>${it.name} <small style="color:var(--text3);margin-left:4px">${priceToCredits(it.price)}cr</small></div>`).join('')}</div>` : ''}
        </div>
        <div class="tenant-credits">
          <div class="credit-num">${(t.credits||0) - usedCredits}</div>
          <div class="credit-used">of ${t.credits||0} left</div>
          <div style="margin-top:4px"><span class="tag tag-${usedCredits>0?'assigned':'available'}">${usedCredits} used</span></div>
        </div>
      </div>`;
  }).join('');
}

function openAddTenant() { openEditTenant(null); }

function openEditTenant(id) {
  currentTenantId = id;
  const t = id ? tenants.find(x => x.id === id) : null;
  document.getElementById('tenant-modal-title').textContent = t ? 'Edit Tenant' : 'Add Tenant';
  document.getElementById('t-name').value = t?.name || '';
  document.getElementById('t-floor').value = t?.floor || '';
  document.getElementById('t-wing').value = t?.wing || '';
  document.getElementById('t-unit').value = t?.unit || '';
  document.getElementById('t-credits').value = t?.credits ?? 10;
  document.getElementById('btn-delete-tenant').style.display = t ? 'inline-flex' : 'none';
  updateTenantCreditLabel();
  openModal('tenant-modal');
}

function updateTenantCreditLabel() {
  const credits = parseInt(document.getElementById('t-credits').value) || 0;
  document.getElementById('t-credit-amd').textContent =
    `= ${fmtAmd(credits * settings.unit)}/month purchasing power`;
}
document.getElementById('t-credits').addEventListener('input', updateTenantCreditLabel);

function saveTenant() {
  const name = document.getElementById('t-name').value.trim();
  if (!name) { alert('Tenant name is required'); return; }
  const data = {
    name,
    floor: document.getElementById('t-floor').value.trim(),
    wing: document.getElementById('t-wing').value.trim(),
    unit: document.getElementById('t-unit').value.trim(),
    credits: parseInt(document.getElementById('t-credits').value) || 0,
  };
  if (currentTenantId) {
    const idx = tenants.findIndex(t => t.id === currentTenantId);
    if (idx !== -1) tenants[idx] = { ...tenants[idx], ...data };
  } else {
    data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    data.items = [];
    tenants.push(data);
  }
  LS.set('inv_tenants', tenants);
  closeModal('tenant-modal');
  renderTenants();
  // Refresh tenant selector
  populateTenantSelector();
}

function deleteCurrentTenant() {
  if (!confirm('Remove this tenant? Their item assignments will be cleared.')) return;
  const t = tenants.find(x => x.id === currentTenantId);
  if (t?.items) {
    t.items.forEach(iid => { const it = items.find(x=>x.id===iid); if(it) it.status='available'; });
  }
  tenants = tenants.filter(x => x.id !== currentTenantId);
  LS.set('inv_tenants', tenants);
  LS.set('inv_items', items);
  closeModal('tenant-modal');
  renderTenants();
  populateTenantSelector();
}

// ─── AVAILABLE / BROWSE ───────────────────────────────────────────────────
function populateTenantSelector() {
  const sel = document.getElementById('tenant-selector');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— select tenant —</option>' +
    tenants.map(t => `<option value="${t.id}"${cur===t.id?' selected':''}>${t.name}</option>`).join('');
}

function renderAvailable() {
  const tenantId = document.getElementById('tenant-selector').value;
  const tenant = tenants.find(t => t.id === tenantId);
  const budgetBar = document.getElementById('tenant-budget-bar');

  if (tenant) {
    const assigned = (tenant.items||[]).map(id=>items.find(i=>i.id===id)).filter(Boolean);
    const used = assigned.reduce((s,it)=>s+priceToCredits(it.price),0);
    const remaining = (tenant.credits||0) - used;
    const pct = Math.min(100, Math.round(used/(tenant.credits||1)*100));
    budgetBar.innerHTML = `
      <div class="settings-card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:15px;font-weight:700">${tenant.name}</div>
          <div style="font-size:13px;color:var(--text2)">${remaining}cr remaining of ${tenant.credits||0}</div>
        </div>
        <div style="background:var(--bg);border-radius:4px;height:8px;overflow:hidden">
          <div style="background:var(--accent);width:${pct}%;height:100%;border-radius:4px;transition:width .3s"></div>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text3)">${used} credits used · ${fmtAmd(used*settings.unit)}/month committed</div>
        ${assigned.length ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">${assigned.map(it=>`<span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:12px">${it.name} <strong>${priceToCredits(it.price)}cr</strong></span>`).join('')}</div>` : ''}
      </div>`;
  } else {
    budgetBar.innerHTML = '';
  }

  // Category pills for available
  const allCats = ['All', ...CATEGORIES];
  const pillsEl = document.getElementById('avail-pills');
  pillsEl.innerHTML = allCats.map(c =>
    `<button class="filter-pill${activeAvailFilter===c?' active':''}" onclick="activeAvailFilter='${c}';renderAvailable()">${c==='All'?'All':(CAT_ICONS[c]||'')+' '+c}</button>`
  ).join('');

  let filtered = items.filter(it => {
    const matchCat = activeAvailFilter === 'All' || it.category === activeAvailFilter;
    return matchCat;
  });

  const grid = document.getElementById('avail-cards');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>No items</p></div>';
    return;
  }

  const tenantAssigned = tenant ? (tenant.items||[]) : [];
  grid.className = 'cards-grid';
  grid.innerHTML = filtered.map(it => {
    const credits = priceToCredits(it.price);
    const monthly = monthlyPayment(it.price);
    const isAssigned = tenantAssigned.includes(it.id);
    const imgHtml = it.photo
      ? `<div class="card-img"><img src="${it.photo}" alt=""></div>`
      : `<div class="card-img">${CAT_ICONS[it.category]||'📦'}</div>`;

    let actionBtn = '';
    if (tenant) {
      if (isAssigned) {
        actionBtn = `<button class="btn btn-sm" style="background:var(--red);margin-top:8px;width:100%" onclick="event.stopPropagation();browseToggle('${it.id}')">↩ Return</button>`;
      } else if (it.status === 'available') {
        const used = (tenant.items||[]).reduce((s,iid)=>{const ii=items.find(x=>x.id===iid);return s+(ii?priceToCredits(ii.price):0);},0);
        const remaining = (tenant.credits||0)-used;
        if (credits <= remaining) {
          actionBtn = `<button class="btn btn-sm" style="margin-top:8px;width:100%" onclick="event.stopPropagation();browseToggle('${it.id}')">＋ Pick (${credits}cr)</button>`;
        } else {
          actionBtn = `<button class="btn btn-sm btn-ghost" style="margin-top:8px;width:100%;cursor:not-allowed;opacity:.5" disabled>Not enough credits</button>`;
        }
      } else {
        const ownerTenant = tenants.find(t=>(t.items||[]).includes(it.id));
        actionBtn = `<div style="font-size:11px;color:var(--amber);margin-top:8px;text-align:center">${ownerTenant?'With '+ownerTenant.name:'Unavailable'}</div>`;
      }
    }

    return `
      <div class="item-card" onclick="openDetail('${it.id}')">
        ${imgHtml}
        <div class="card-body">
          <div class="card-name">${it.name}</div>
          <div class="card-cat">${it.category||''}${it.brand?' · '+it.brand:''}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px">${fmtAmd(it.price)}</div>
          <div class="card-footer">
            <span class="credit-badge">${credits}cr</span>
            <span class="status-${isAssigned?'assigned':(it.status||'available')}">
              <span class="status-dot"></span>
              <span class="status-label">${isAssigned?'Yours':STATUS_LABELS[it.status]||'Available'}</span>
            </span>
          </div>
          ${actionBtn}
        </div>
      </div>`;
  }).join('');
}

function browseToggle(itemId) {
  const tenantId = document.getElementById('tenant-selector').value;
  if (!tenantId) return;
  toggleAssign(tenantId, itemId);
  closeModal('detail-modal');
  renderAvailable();
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ─── DATA IO ──────────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({items, tenants, settings}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plus1-inventory.json';
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.items) items = d.items;
      if (d.tenants) tenants = d.tenants;
      if (d.settings) settings = d.settings;
      LS.set('inv_items', items);
      LS.set('inv_tenants', tenants);
      LS.set('inv_settings', settings);
      renderInventory();
      renderTenants();
      renderSettings();
      alert('Imported successfully!');
    } catch { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}
function clearAllData() {
  if (!confirm('Clear ALL inventory data? This cannot be undone.')) return;
  items = []; tenants = [];
  settings = { rate: 24, months: 36, unit: 1000 };
  LS.set('inv_items', items);
  LS.set('inv_tenants', tenants);
  LS.set('inv_settings', settings);
  renderInventory();
  renderTenants();
  renderSettings();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
renderInventory();
renderSettings();
populateTenantSelector();
</script>
</body>
</html>
