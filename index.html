<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
/* One-time regular-Chrome repair. Incognito has no persistent worker/cache,
   so regular Chrome must explicitly detach from any old installation. */
(function() {
  var repairVersion = 'chrome-repair-20260612-3';
  var repairKey = 'plusone_browser_repair';
  var alreadyRepaired = false;

  try {
    alreadyRepaired = localStorage.getItem(repairKey) === repairVersion;
  } catch (e) {}
  if (alreadyRepaired) return;

  try {
    localStorage.setItem(repairKey, repairVersion);
    localStorage.removeItem('plusone_snapshot_v3');
    localStorage.removeItem('plusone_snapshot_v4');
  } catch (e) {}

  var cacheCleanup = Promise.resolve();
  if ('caches' in window) {
    cacheCleanup = caches.keys().then(function(keys) {
      return Promise.all(keys.map(function(key) { return caches.delete(key); }));
    });
  }

  var workerCleanup = Promise.resolve();
  if ('serviceWorker' in navigator) {
    workerCleanup = navigator.serviceWorker.getRegistrations().then(function(regs) {
      return Promise.all(regs.map(function(reg) { return reg.unregister(); }));
    });
  }

  Promise.all([cacheCleanup, workerCleanup]).then(function() {
    var url = new URL(location.href);
    url.pathname = '/offices/';
    url.searchParams.set('repair', repairVersion);
    location.replace(url.pathname + url.search + url.hash);
  });
})();
</script>
<meta name="theme-color" content="#08182b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plus One">
<link rel="manifest" href="/offices/manifest.json">
<link rel="apple-touch-icon" href="/offices/icon.png">
<title>Plus One · Գրասենյակներ</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PLUS ONE LAW GROUP — Premium Design System 2026
   
   Design concept: "Modern Legal Operations"
   A deep navy / teal palette with cyan accents.
   Typeface: system-ui with
   tight tracking on headings for authoritative feel.
   Signature: each card has a left accent bar that 
   color-codes payment state — unpaid=crimson,
   partial=amber, paid=emerald.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ── Token System ── */
:root {
  /* Brand */
  --forest:   #0b1d33;
  --forest-2: #0d2f46;
  --forest-3: #0f5962;
  --sage:     #14b8a6;
  --sage-l:   #2dd4bf;
  --mist:     #c8f5f1;
  --champagne:#06b6d4;
  --champagne-l:#67e8f9;
  --obsidian: #061324;

  /* Semantic */
  --bg:       #edf3f9;
  --surface:  #ffffff;
  --surface-2:#f7fafc;
  --surface-3:#eaf1f7;
  --border:   #d8e2ec;
  --border-2: #c4d2df;
  --ink:      #0b1728;
  --ink-2:    #40536a;
  --ink-3:    #8293a8;
  --ink-4:    #a8b6c6;

  /* Status */
  --paid:      #059669;
  --paid-l:    #d1fae5;
  --paid-bg:   #ecfdf5;
  --unpaid:    #e11d48;
  --unpaid-l:  #fee2e2;
  --deposit:   #d97706;
  --deposit-l: #fef3c7;
  --late:      #5b21b6;
  --late-l:    #ede9fe;
  --prepaid:   #1e40af;
  --prepaid-l: #dbeafe;
  --blue:      #0891b2;
  --blue-l:    #cffafe;
  --purple:    #7c3aed;
  --purple-l:  #ede9fe;
  --amber:     #d97706;
  --amber-l:   #fef3c7;
  --red:       #dc2626;
  --red-l:     #fee2e2;
  --green:     var(--sage);
  --green-light:var(--paid-l);
  --green-dark: var(--forest);
  --green-mid:  var(--sage-l);

  /* Layout */
  --header-h:  68px;
  --page-max:  1160px;
  --page-gutter: clamp(14px, 3vw, 24px);
  --radius-sm: 10px;
  --radius:    16px;
  --radius-lg: 22px;
  --radius-xl: 28px;

  /* Shadow */
  --sh-xs: 0 1px 3px rgba(15,35,55,.06), 0 1px 2px rgba(15,35,55,.04);
  --sh-sm: 0 4px 14px rgba(15,35,55,.08), 0 1px 4px rgba(15,35,55,.04);
  --sh-md: 0 10px 30px rgba(15,35,55,.10), 0 2px 8px rgba(15,35,55,.05);
  --sh-lg: 0 18px 56px rgba(15,35,55,.14), 0 4px 16px rgba(15,35,55,.07);
  --sh-xl: 0 28px 80px rgba(15,35,55,.20), 0 8px 24px rgba(15,35,55,.10);

  /* Aliases expected by JS-generated HTML */
  --card:    var(--surface);
  --text:    var(--ink);
  --text2:   var(--ink-2);
  --text3:   var(--ink-3);
  --shadow:  var(--sh-md);
  --shadow-lg: var(--sh-lg);
  --sticky-h: 120px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--obsidian); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ── Offline Banner ── */
#offlineBanner {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 400;
  background: var(--obsidian);
  color: #fff;
  font-size: 12px; font-weight: 700;
  text-align: center; padding: 9px 16px;
  border-bottom: 1px solid rgba(201,168,76,.3);
}
#offlineBanner.show { display: block; }
body.offline { padding-top: 37px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEADER
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.header {
  position: relative; z-index: 1;
  height: var(--header-h);
  background: linear-gradient(105deg, #08182b 0%, #0b2940 62%, #0f766e 140%);
  box-shadow: 0 1px 0 rgba(45,212,191,.18), 0 6px 24px rgba(4,18,35,.28);
}
.header-inner {
  width: 100%; max-width: var(--page-max); height: 100%;
  margin: 0 auto;
  padding-left: max(var(--page-gutter), env(safe-area-inset-left));
  padding-right: max(var(--page-gutter), env(safe-area-inset-right));
  display: flex; align-items: center; gap: 12px;
}
/* Gold accent line under header */
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent 0%, var(--sage) 30%, var(--champagne-l) 50%, var(--sage) 70%, transparent 100%);
}
.header-logo {
  width: 42px; height: 42px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  border: 1.5px solid rgba(103,232,249,.45);
  box-shadow: 0 0 0 3px rgba(20,184,166,.14);
  flex-shrink: 0;
}
.header-title {
  flex: 1; min-width: 0;
  overflow: hidden;
  font-size: 16px; font-weight: 800; letter-spacing: -.025em; color: #fff;
  line-height: 1.1;
}
.header-name {
  display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-sub {
  display: block;
  font-size: 10px; font-weight: 500;
  color: var(--mist); opacity: .85;
  letter-spacing: .06em; text-transform: uppercase;
  margin-top: 3px;
}
.header-add-btn {
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 5px;
  padding: 8px 13px;
  border-radius: 999px; border: 1.5px solid rgba(103,232,249,.42);
  background: rgba(6,182,212,.18);
  color: #cffafe;
  font-size: 12px; font-weight: 800;
  white-space: nowrap;
  transition: background .15s, border-color .15s;
}
.header-add-btn:hover { background: rgba(6,182,212,.3); border-color: rgba(103,232,249,.75); }
.header-add-btn:active { transform: scale(.95); }
.sync-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 11px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.85);
  font-size: 11px; font-weight: 700;
  min-width: 72px; justify-content: center;
  white-space: nowrap;
  transition: background .2s;
}
.sync-pill.ok  { background: rgba(22,101,52,.4); border-color: rgba(134,239,172,.3); color: #bbf7d0; }
.sync-pill.err { background: rgba(153,27,27,.35); border-color: rgba(252,165,165,.28); color: #fecaca; }
.sync-pill.loading .sync-spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STICKY CONTROLS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sticky-zone {
  position: relative;
  z-index: 1;
  background: rgba(237,243,249,.95);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(15,35,55,.07);
}
.sticky-inner {
  width: 100%; max-width: var(--page-max);
  margin: 0 auto;
  padding: 12px var(--page-gutter) 0;
}
.control-row {
  display: grid;
  grid-template-columns: minmax(260px, .9fr) minmax(320px, 1.35fr);
  gap: 10px;
  align-items: stretch;
}
.month-row {
  display: flex; align-items: center; gap: 8px;
  min-height: 46px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  box-shadow: var(--sh-xs);
}
.month-row label { font-size: 15px; color: var(--ink); flex-shrink: 0; }
.month-row select {
  flex: 1; border: none; background: transparent;
  font-size: 13px; font-weight: 800; color: var(--ink);
  padding: 2px 4px; outline: none; cursor: pointer;
}
.last-sync { font-size: 10px; color: var(--ink-3); font-weight: 600; white-space: nowrap; }
.elec-month-badge {
  font-size: 10px; font-weight: 800;
  padding: 3px 8px; border-radius: 999px;
  background: linear-gradient(135deg, rgba(37,99,235,.1), rgba(124,58,237,.08));
  color: #0e7490;
  border: 1px solid rgba(37,99,235,.18);
  white-space: nowrap; flex-shrink: 0;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; height: 46px;
  padding: 0 40px 0 16px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-size: 14px; font-weight: 500;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--sh-xs);
}
.search-wrap input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(20,184,166,.16), var(--sh-xs);
}
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 15px; color: var(--ink-3);
  background: none; border: none; display: none; cursor: pointer;
}
.search-clear.visible { display: block; }
.filter-chips {
  display: flex; gap: 7px;
  overflow-x: auto; padding: 10px 1px 11px;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 7px 14px; border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink-2); font-size: 12px; font-weight: 700;
  white-space: nowrap; flex-shrink: 0;
  transition: all .18s;
  box-shadow: var(--sh-xs);
}
.chip:active { transform: scale(.93); }
.chip.active {
  background: var(--forest);
  border-color: var(--forest);
  color: #fff;
  box-shadow: 0 6px 18px rgba(8,145,178,.24);
}
/* Champagne underline on active chip */
.chip.active::after {
  content: '';
  display: block; width: 16px; height: 2px;
  background: var(--champagne);
  border-radius: 2px; margin: 3px auto -3px;
}

/* ── Paid toggle bar ── */
.paid-toggle-bar {
  padding: 4px 0 8px; display: flex; align-items: center;
}
.paid-toggle-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 999px;
  border: 1.5px dashed rgba(20,184,166,.38);
  background: rgba(255,255,255,.7);
  color: var(--ink-3); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .18s;
}
.paid-toggle-btn:hover { border-color: var(--sage); color: var(--paid); background: rgba(209,250,229,.45); }
.paid-toggle-btn.active {
  border-style: solid; border-color: var(--sage);
  background: var(--paid-l); color: var(--paid);
  box-shadow: 0 4px 12px rgba(22,101,52,.15);
}
.paid-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 5px;
  border-radius: 999px; background: var(--forest); color: #fff;
  font-size: 10px; font-weight: 900;
}
.paid-toggle-btn.active .paid-count-badge { background: var(--paid); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN WRAP
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.wrap {
  width: 100%; max-width: var(--page-max); margin: 0 auto;
  padding: 18px var(--page-gutter) 40px;
}

/* ── Pull-to-refresh ── */
.ptr-indicator {
  display: flex; align-items: center; justify-content: center;
  height: 0; overflow: hidden; transition: height .2s;
  font-size: 12px; color: var(--ink-3); gap: 6px;
}
.ptr-indicator.active { height: 40px; }
.ptr-spin { animation: spin .8s linear infinite; }

/* ── Stats grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 12px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 112px;
  padding: 16px 18px;
  box-shadow: var(--sh-sm);
  position: relative; overflow: hidden;
  transition: transform .15s;
}
.stat-card:active { transform: scale(.98); }
/* Signature accent bar — different color per card position */
.stat-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 0 2px 2px 0;
}
.stat-card:nth-child(1)::before { background: var(--sage); }
.stat-card:nth-child(2)::before { background: var(--purple); }
.stat-card:nth-child(3)::before { background: var(--champagne); }
.stat-card:nth-child(4)::before { background: var(--blue); }
.stat-label {
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-3);
  margin-bottom: 6px;
}
.stat-val {
  font-size: 20px; font-weight: 900; letter-spacing: -.04em;
  color: var(--ink); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-sub { font-size: 11px; color: var(--ink-3); font-weight: 600; margin-top: 4px; }
.c-green  { color: var(--paid); }
.c-red    { color: var(--red); }
.c-amber  { color: var(--amber); }
.c-blue   { color: var(--blue); }
.c-purple { color: var(--purple); }

/* ── Progress panel ── */
.prog-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--sh-sm);
  margin-bottom: 12px;
}
.prog-row { margin-bottom: 12px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--ink-2); margin-bottom: 6px; }
.prog-pct { font-weight: 900; color: var(--sage); }
.prog-track { height: 8px; background: var(--surface-3); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
.prog-fill { height: 100%; border-radius: 999px; transition: width .7s cubic-bezier(.2,.8,.4,1); }
.pf-green  { background: linear-gradient(90deg, var(--sage), var(--sage-l)); }
.pf-blue   { background: linear-gradient(90deg, #2563eb, #60a5fa); }
.pf-purple { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

/* ── Chart panel ── */
.chart-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--sh-sm);
  margin-bottom: 12px;
}
.chart-title {
  font-size: 12px; font-weight: 800; color: var(--ink-2);
  margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
canvas#reportChart { width: 100%; height: 130px; border-radius: 8px; }

/* ── Sort bar ── */
.sort-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--sh-xs);
  margin-bottom: 12px;
  font-size: 11px; color: var(--ink-3); font-weight: 700;
}
.sort-bar select {
  flex: 1; border: none; background: transparent;
  font-size: 12px; font-weight: 800; color: var(--ink);
  outline: none;
}

/* ── Financial report ── */
.report-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; text-align: left;
  padding: 13px 16px; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--surface), var(--surface-2) 60%, #fffbf0);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--sh-sm);
  font-size: 13px; font-weight: 800; color: var(--ink);
  cursor: pointer;
}
.report-body {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--sh-sm);
  margin-bottom: 12px;
}
.report-body.open { display: block; }
.report-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--surface-3);
  font-size: 12px;
}
.report-row:last-child { border-bottom: none; }
.report-row-label { color: var(--ink-2); font-weight: 600; }
.report-row-val { font-weight: 800; }
.report-section {
  font-size: 10px; font-weight: 900; letter-spacing: .05em;
  text-transform: uppercase; color: var(--ink-4);
  padding: 10px 0 4px;
}
.export-row { display: flex; gap: 8px; margin-top: 12px; }
.export-btn {
  flex: 1; padding: 10px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink-2); font-size: 12px; font-weight: 700;
  transition: all .15s; cursor: pointer;
}
.export-btn:active { transform: scale(.96); }
.export-btn.primary {
  background: var(--forest);
  border-color: var(--forest);
  color: #fff;
  box-shadow: 0 6px 16px rgba(8,145,178,.22);
}
.export-btn.primary:hover { background: var(--forest-2); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DAY GROUPS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.day-grp {
  font-size: 11px; font-weight: 800; letter-spacing: .04em;
  color: var(--ink-3); padding: 10px 2px 6px;
  display: flex; align-items: center; gap: 6px;
}
.day-grp-badge {
  background: var(--paid-l); color: var(--paid);
  font-size: 10px; font-weight: 900;
  padding: 2px 8px; border-radius: 999px;
}
.day-grp.today-grp .day-grp-badge { background: var(--unpaid-l); color: var(--unpaid); }
.today-date-icon {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 20px;
  background: linear-gradient(#f87171 0 26%, #f8fafc 26% 100%);
  border: 1px solid rgba(15,23,42,.18);
  color: var(--ink);
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
  padding-top: 3px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARDS  ← SIGNATURE ELEMENT
   The left accent bar communicates payment state
   at a glance without needing to open the card.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card {
  position: relative;
  display: grid;
  grid-template-rows: 164px 142px 42px;
  height: 348px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--sh-sm);
  transition: transform .18s ease, box-shadow .18s ease, opacity .25s;
  user-select: none;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-lg);
}
/* Top shimmer line */
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.3) 40%, rgba(106,170,82,.25) 60%, transparent);
  pointer-events: none;
}
/* ── State-coded left bar (signature) ── */
.card::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--border-2);
  transition: background .3s;
}
/* These classes are toggled by JS via patchCard */
.card[data-card]                         { --bar: var(--border-2); }

.card-top {
  min-height: 0; overflow: hidden;
  padding: 14px 16px 12px; display: flex; gap: 12px; cursor: pointer;
}
.card-left { flex: 1; min-width: 0; }
.apt-label {
  font-size: 10px; font-weight: 900; letter-spacing: .07em;
  text-transform: uppercase; color: var(--sage);
  margin-bottom: 3px;
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.apt-name {
  font-size: 16px; font-weight: 800; letter-spacing: -.025em;
  color: var(--ink); margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.apt-phone { font-size: 12px; color: var(--ink-3); font-weight: 500; margin-bottom: 4px; }
.apt-detail {
  display: inline-flex; align-items: center;
  background: var(--surface-3); border: 1px solid var(--border);
  border-radius: 999px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: var(--ink-2);
  margin-top: 4px;
}
.card-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  flex-shrink: 0; text-align: right;
}
.rent-amt {
  font-size: 15px; font-weight: 900; letter-spacing: -.03em;
  color: #fff;
  background: var(--forest);
  padding: 5px 10px; border-radius: var(--radius-sm);
  box-shadow: 0 4px 12px rgba(8,145,178,.2);
}
.rent-sub { font-size: 11px; color: var(--ink-3); font-weight: 600; }
.util-amt { font-size: 11px; font-weight: 700; color: var(--ink-2); }
.status-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; margin-top: 3px; }

/* ── Status chips ── */
.s-chip {
  font-size: 10px; font-weight: 800; letter-spacing: .02em;
  padding: 3px 8px; border-radius: 999px;
}
.s-paid     { background: var(--paid-l);    color: var(--paid); }
.s-unpaid   { background: var(--unpaid-l);  color: var(--unpaid); }
.s-deposit  { background: var(--deposit-l); color: var(--deposit); }
.s-late     { background: var(--late-l);    color: var(--late); }
.s-prepaid  { background: var(--prepaid-l); color: var(--prepaid); }

/* Overdue flash */
.overdue-flash {
  box-shadow: var(--sh-sm), 0 0 0 1.5px rgba(153,27,27,.18);
  animation: overdueGlow 2s ease-in-out infinite alternate;
}
@keyframes overdueGlow {
  from { box-shadow: var(--sh-sm), 0 0 0 1.5px rgba(153,27,27,.12); }
  to   { box-shadow: var(--sh-md), 0 0 0 2px rgba(153,27,27,.28); }
}

/* ── Channel badges ── */
.ch-badge {
  font-size: 9px; font-weight: 900; letter-spacing: .04em;
  padding: 2px 6px; border-radius: 5px;
}
.bwa  { background: #dcfce7; color: #15803d; }
.btg  { background: #cffafe; color: #0e7490; }
.bsms { background: #fef3c7; color: #b45309; }
.elec-alert {
  font-size: 10px; font-weight: 900;
  background: var(--unpaid-l); color: var(--unpaid);
  padding: 2px 6px; border-radius: 6px;
}
.highlight { background: #fef08a; border-radius: 3px; padding: 0 2px; }

/* ── Paid-at table ── */
.paid-at-table {
  margin-top: 4px; min-height: 20px;
  display: flex; flex-direction: column; gap: 2px; align-items: flex-end;
}
.pa-row {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 6px; white-space: nowrap;
}
.pa-icon { font-size: 10px; line-height: 1; }
.pa-time { font-variant-numeric: tabular-nums; letter-spacing: .01em; }
.pa-rent { background: #dcfce7; color: #065f46; }
.pa-elec { background: #dbeafe; color: #1e40af; }
.pa-net  { background: #ede9fe; color: #4c1d95; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARD ACTIONS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card-actions {
  padding: 10px 12px 12px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-template-rows: 58px 44px;
  gap: 8px;
  align-items: stretch;
}
.action-btn {
  min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 9px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink-2);
  font-size: 11px; font-weight: 800; line-height: 1.2;
  text-align: center; white-space: normal;
  min-height: 0; height: 58px;
  transition: transform .13s, box-shadow .13s, background .13s;
  box-shadow: var(--sh-xs);
}
.action-btn:active { transform: scale(.93) translateY(1px); box-shadow: none; }

/* Paid states */
.action-btn.a-epaid, .action-btn.a-rpaid {
  border-color: rgba(22,101,52,.3);
  background: linear-gradient(135deg, #d1fae5, #a7f3d0);
  color: #065f46;
  box-shadow: 0 3px 10px rgba(22,101,52,.18);
}
.action-btn.a-eunpaid, .action-btn.a-runpaid {
  border-color: rgba(153,27,27,.25);
  background: linear-gradient(135deg, #fee2e2, #fecaca);
  color: var(--unpaid);
  box-shadow: 0 3px 10px rgba(153,27,27,.15);
}
.action-btn.a-rdeposit {
  border-color: rgba(146,64,14,.25);
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  color: #92400e;
  box-shadow: 0 3px 10px rgba(146,64,14,.15);
}
.action-btn.a-rlate {
  border-color: rgba(91,33,182,.22);
  background: linear-gradient(135deg, #ede9fe, #ddd6fe);
  color: #5b21b6;
  box-shadow: 0 3px 10px rgba(91,33,182,.15);
}
.action-btn.a-rprepaid {
  border-color: rgba(30,64,175,.22);
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  color: #1e40af;
  box-shadow: 0 3px 10px rgba(30,64,175,.15);
}
.deposit-btn small {
  display: block; font-size: 9px; font-weight: 700; opacity: .8; margin-top: 1px;
}
.prepay-btn {
  position: relative; overflow: hidden;
  flex: 1; min-width: 0;
  border: none !important;
  background: linear-gradient(135deg, var(--champagne) 0%, #0891b2 55%, #0e7490 100%) !important;
  color: #fff !important;
  border-radius: var(--radius-sm) !important;
  box-shadow: 0 4px 14px rgba(201,168,76,.35), inset 0 1px 0 rgba(255,255,255,.2) !important;
  transition: transform .14s, box-shadow .14s, opacity .14s !important;
}
.prepay-btn small { display: block; font-size: 9px; font-weight: 700; opacity: .8; margin-top: 2px; }
.prepay-btn:active { transform: scale(.94) !important; }
.prepay-btn.is-active {
  background: linear-gradient(135deg, var(--sage), var(--forest-3)) !important;
  box-shadow: 0 4px 14px rgba(20,184,166,.25) !important;
}
.prepay-btn.is-saving { opacity: .65 !important; pointer-events: none !important; }

/* Icon buttons */
.quick-btns {
  grid-column: 1 / -1;
  display: flex; gap: 7px; justify-content: flex-end; align-items: stretch;
}
.icon-btn {
  width: 46px; padding: 8px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink-2); font-size: 15px;
  box-shadow: var(--sh-xs);
  transition: transform .13s, box-shadow .13s;
}
.icon-btn:active { transform: scale(.88); }
.icon-btn:hover  { box-shadow: var(--sh-sm); background: var(--surface-2); }
.send-btn {
  width: 46px; padding: 8px; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, #25d366, #1aaa50);
  color: #fff; font-size: 15px;
  box-shadow: 0 4px 14px rgba(37,211,102,.3);
  transition: transform .13s, box-shadow .13s;
}
.send-btn:active { transform: scale(.88); box-shadow: 0 2px 6px rgba(37,211,102,.2); }

/* ── Message expand ── */
.msg-toggle {
  width: 100%; height: 42px; padding: 0 16px;
  background: transparent; border: none;
  border-top: 1px solid var(--border);
  font-size: 11px; font-weight: 700; color: var(--ink-3);
  text-align: center; cursor: pointer;
  transition: background .15s, color .15s;
}
.msg-toggle:hover { background: var(--surface-3); color: var(--ink-2); }
.msg-body {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
  background: rgba(4,18,35,.58);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
  animation: msgFade .18s ease;
}
@keyframes msgFade { from { opacity: 0; } to { opacity: 1; } }
.msg-body.open { display: flex; }
body.notification-open { overflow: hidden; touch-action: none; }
.msg-sheet {
  width: min(100%, 620px); max-height: min(86vh, 760px);
  overflow: auto; position: relative;
  overscroll-behavior: contain;
  touch-action: pan-y;
  -webkit-overflow-scrolling: touch;
  padding: 20px; border-radius: 24px;
  background: var(--surface-2);
  border: 1px solid rgba(255,255,255,.72);
  box-shadow: 0 30px 90px rgba(4,18,35,.32);
  animation: msgSheetIn .22s cubic-bezier(.2,.8,.3,1);
}
@keyframes msgSheetIn {
  from { opacity: 0; transform: translateY(18px) scale(.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 12px;
}
.msg-sheet-title {
  font-size: 13px; font-weight: 900; color: var(--ink);
}
.msg-close {
  width: 34px; height: 34px; border: 0; border-radius: 999px;
  background: var(--surface-3); color: var(--ink-2);
  font-size: 18px; line-height: 1;
}
.msg-text {
  font-size: 12px; line-height: 1.72;
  white-space: pre-wrap; color: var(--ink);
  font-family: 'Menlo', 'Courier New', monospace;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px; margin-bottom: 8px;
}
.copy-msg-btn {
  width: 100%; padding: 9px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--ink-2);
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background .13s;
}
.copy-msg-btn:hover { background: var(--surface-3); }
.no-elec {
  font-size: 11px; color: var(--ink-4); font-style: italic;
  padding: 8px 16px; border-top: 1px solid var(--border);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MODAL
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,15,10,.55);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .18s ease;
}
.modal-bg.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 20px 18px 36px;
  width: 100%; max-width: 640px; max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 -20px 60px rgba(10,15,10,.28);
  animation: slideUp .22s cubic-bezier(.3,.9,.4,1);
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
.modal h2 { font-size: 17px; font-weight: 900; letter-spacing: -.03em; color: var(--ink); margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label {
  font-size: 10px; font-weight: 900; letter-spacing: .05em; text-transform: uppercase;
  color: var(--ink-3); display: block; margin-bottom: 5px;
}
.field input, .field select {
  font-size: 15px; padding: 11px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface-2);
  color: var(--ink); width: 100%;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(20,184,166,.16);
  background: var(--surface);
}
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.modal-save {
  flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none;
  background: var(--forest);
  color: #fff; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: opacity .2s;
  box-shadow: 0 6px 18px rgba(8,145,178,.24);
}
.modal-save:hover { background: var(--forest-2); }
.modal-save:active { opacity: .8; }
.modal-cancel {
  padding: 13px 18px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--ink-2);
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.modal-end {
  padding: 13px 18px; border-radius: var(--radius-sm);
  border: 1.5px solid #fecaca;
  background: var(--surface); color: var(--unpaid);
  font-size: 14px; font-weight: 800; cursor: pointer;
}
.add-tenant-btn {
  position: relative; overflow: hidden; width: 100%;
  border: none; border-radius: var(--radius-lg); padding: 15px 16px;
  margin: 0 0 12px;
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-2) 50%, var(--forest) 100%);
  color: #fff; font-size: 15px; font-weight: 900;
  box-shadow: 0 8px 24px rgba(8,145,178,.24), inset 0 1px 0 rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: -.01em; cursor: pointer;
}
.add-tenant-btn:active { transform: scale(.98); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0));
  left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--obsidian);
  color: #fff; font-size: 13px; font-weight: 700;
  padding: 10px 20px; border-radius: 999px;
  border: 1px solid rgba(201,168,76,.25);
  opacity: 0; transition: opacity .22s, transform .22s;
  pointer-events: none; z-index: 400; white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,.35);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success::before { content: '✓ '; color: #86efac; }
.toast.error::before   { content: '✗ '; color: #fca5a5; }

/* ── Skeleton loader ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface-3) 25%, var(--surface) 50%, var(--surface-3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.3s infinite;
  border-radius: var(--radius-lg); height: 110px; margin-bottom: 10px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── Empty / error ── */
.empty { text-align: center; color: var(--ink-3); font-size: 13px; font-weight: 700; padding: 3rem 0; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── Rent paid-at ── */
.rent-paid-at { margin-top: 3px; font-size: 10px; color: var(--paid); font-weight: 800; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   METER INPUT PANEL
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.meter-header-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 2px 10px; gap: 8px;
}
.meter-month-label { font-size: 13px; font-weight: 800; color: var(--ink-2); }
.meter-month-select {
  flex: 1; max-width: 210px; min-height: 40px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--ink); font-size: 13px; font-weight: 800;
}
.meter-save-all-btn {
  padding: 9px 16px; border-radius: var(--radius-sm); border: none;
  background: var(--forest); color: #fff;
  font-size: 12px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 14px rgba(8,145,178,.22);
  transition: opacity .15s;
}
.meter-save-all-btn:active { opacity: .8; }
.meter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 10px; overflow: hidden;
  box-shadow: var(--sh-sm);
}
.meter-card-head {
  padding: 13px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.meter-apt-label {
  font-size: 10px; font-weight: 900; letter-spacing: .07em;
  text-transform: uppercase; color: var(--sage);
}
.meter-apt-name { font-size: 14px; font-weight: 800; color: var(--ink); margin-top: 2px; }
.meter-saved-badge {
  display: none;
  font-size: 10px; font-weight: 900; padding: 3px 9px;
  border-radius: 999px;
  background: var(--paid-l); color: var(--paid);
}
.meter-saved-badge.show { display: inline-block; }
.meter-inputs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 16px 12px;
}
.meter-field label {
  font-size: 10px; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-3);
  display: block; margin-bottom: 5px;
}
.meter-field input {
  width: 100%; font-size: 20px; font-weight: 900;
  letter-spacing: -.03em;
  padding: 11px 13px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface-2); color: var(--ink);
  outline: none; font-variant-numeric: tabular-nums;
  -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
.meter-field input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(20,184,166,.16);
  background: var(--surface);
}
.meter-field input.dirty {
  border-color: var(--amber);
  background: #fffbf0;
}
.meter-total-row {
  padding: 0 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
  padding-top: 10px; margin-top: 2px;
}
.meter-total-label { font-size: 11px; color: var(--ink-3); font-weight: 700; }
.meter-total-val {
  font-size: 16px; font-weight: 900; letter-spacing: -.03em;
  color: var(--forest); font-variant-numeric: tabular-nums;
}
.meter-save-btn {
  margin: 0 16px 14px;
  width: calc(100% - 32px);
  padding: 11px; border-radius: var(--radius-sm); border: none;
  background: var(--forest); color: #fff;
  font-size: 13px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 14px rgba(8,145,178,.2);
  transition: opacity .15s;
}
.meter-save-btn:active { opacity: .8; }
.meter-save-btn.saving { opacity: .6; pointer-events: none; }
.meter-empty {
  text-align: center; padding: 40px 20px;
  color: var(--ink-3); font-size: 14px; font-weight: 700;
}
.meter-table-wrap {
  width: 100%;
  overflow-x: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--sh-sm);
}
.meter-table {
  width: 100%;
  min-width: 760px;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}
.meter-table th,
.meter-table td {
  border-bottom: 1px solid var(--border);
  padding: 8px;
  text-align: left;
  vertical-align: middle;
  white-space: nowrap;
}
.meter-table th {
  position: static;
  z-index: 1;
  background: var(--forest);
  color: #fff;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.meter-table tbody tr:last-child td { border-bottom: none; }
.meter-table tbody tr:nth-child(even) { background: var(--surface-2); }
.meter-table input {
  width: 92px;
  min-height: 36px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-weight: 800;
  outline: none;
}
.meter-table input[type="text"] { width: 128px; font-weight: 700; }
.meter-table input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(20,184,166,.16);
}
.meter-table input.dirty {
  border-color: var(--amber);
  background: #fffbf0;
}
.meter-office-cell {
  min-width: 130px;
  font-weight: 900;
  color: var(--ink);
}
.meter-office-name {
  display: block;
  margin-top: 2px;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.meter-number-cell {
  font-variant-numeric: tabular-nums;
  font-weight: 900;
}
.meter-total-cell { color: var(--forest); }
.meter-table .meter-save-btn {
  width: auto;
  min-width: 72px;
  margin: 0;
  padding: 9px 10px;
  box-shadow: none;
  font-size: 12px;
}

/* Serial number row */
.meter-serial-row {
  padding: 0 16px 10px;
  display: flex; flex-direction: column; gap: 4px;
}
.meter-serial-row label {
  font-size: 10px; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-3);
}
.meter-serial-row input {
  width: 100%; font-size: 14px; font-weight: 600;
  padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface-2); color: var(--ink);
  outline: none; transition: border-color .2s;
}
.meter-serial-row input:focus { border-color: var(--sage); background: var(--surface); }

/* Calculated result grid — 4 cells: KwhDay KwhNight AMDDay AMDNight */
.meter-result-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 6px; padding: 10px 16px;
  background: var(--surface-3);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.meter-result-empty { padding: 0; background: none; border: none; }
.meter-result-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
}
.meter-result-label {
  font-size: 9px; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; color: var(--ink-3);
  margin-bottom: 4px;
}
.meter-result-val {
  font-size: 14px; font-weight: 900; letter-spacing: -.02em;
  color: var(--ink); font-variant-numeric: tabular-nums;
}

/* Focused electricity entry */
.electricity-summary {
  display: grid; grid-template-columns: 1fr auto;
  align-items: center; gap: 16px;
  margin: 4px 0 14px; padding: 18px 20px;
  border-radius: var(--radius-lg);
  background: linear-gradient(125deg, #08182b, #0d3548 68%, #0f766e);
  color: #fff; box-shadow: 0 14px 36px rgba(6,19,36,.2);
}
.electricity-summary-label {
  font-size: 10px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: #99f6e4;
}
.electricity-summary-value {
  margin-top: 3px; font-size: clamp(25px, 5vw, 38px);
  line-height: 1; font-weight: 950; letter-spacing: -.045em;
  font-variant-numeric: tabular-nums;
}
.electricity-summary-meta {
  text-align: right; font-size: 11px; font-weight: 750;
  color: rgba(255,255,255,.72); white-space: nowrap;
}
.electricity-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 12px;
}
.electricity-card {
  position: relative; overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--sh-sm);
  transition: border-color .2s, box-shadow .2s, transform .2s;
}
.electricity-card:focus-within {
  border-color: rgba(20,184,166,.65);
  box-shadow: 0 12px 30px rgba(15,89,98,.14);
  transform: translateY(-1px);
}
.electricity-card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; padding: 16px 16px 10px;
}
.electricity-office {
  font-size: 18px; font-weight: 950; letter-spacing: -.025em; color: var(--ink);
}
.electricity-name {
  margin-top: 2px; color: var(--ink-3); font-size: 11px; font-weight: 700;
  max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.electricity-context {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 13px;
}
.electricity-context span {
  padding: 5px 8px; border-radius: 8px;
  background: var(--surface-3); color: var(--ink-2);
  font-size: 10px; font-weight: 750; font-variant-numeric: tabular-nums;
}
.electricity-inputs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
  padding: 0 16px 13px;
}
.electricity-field label {
  display: block; margin-bottom: 5px;
  color: var(--ink-3); font-size: 10px; font-weight: 850;
  letter-spacing: .06em; text-transform: uppercase;
}
.electricity-field input {
  width: 100%; min-width: 0; padding: 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--ink);
  outline: none; font-size: 20px; font-weight: 900;
  letter-spacing: -.03em; font-variant-numeric: tabular-nums;
}
.electricity-field input:focus {
  border-color: var(--sage); background: #fff;
  box-shadow: 0 0 0 3px rgba(20,184,166,.13);
}
.electricity-field input.dirty { border-color: var(--amber); background: #fffbeb; }
.electricity-card-foot {
  display: grid; grid-template-columns: 1fr auto; align-items: center;
  gap: 12px; padding: 12px 16px;
  border-top: 1px solid var(--border); background: var(--surface-2);
}
.electricity-result-label {
  color: var(--ink-3); font-size: 10px; font-weight: 750;
}
.electricity-result-usage {
  margin-top: 2px; color: var(--ink-2); font-size: 11px; font-weight: 800;
}
.electricity-result-total {
  margin-top: 3px; color: var(--forest); font-size: 20px;
  font-weight: 950; letter-spacing: -.035em; font-variant-numeric: tabular-nums;
}
.electricity-save {
  min-width: 76px; padding: 10px 12px; border: 0;
  border-radius: 10px; background: var(--forest); color: #fff;
  font-size: 12px; font-weight: 850; cursor: pointer;
}
.electricity-save.saving { opacity: .55; pointer-events: none; }
@media (max-width: 520px) {
  .meter-header-row { align-items: stretch; flex-wrap: wrap; }
  .meter-month-select { max-width: none; }
  .meter-save-all-btn { flex: 1; }
  .electricity-summary { padding: 15px 16px; }
  .electricity-grid { grid-template-columns: 1fr; }
}
@media (max-width: 760px) {
  .control-row { grid-template-columns: 1fr; gap: 8px; }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESPONSIVE
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (min-width: 640px) {
  .stats-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 1040px) {
  .wrap {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 14px; align-items: start;
  }
  #statsGrid { grid-column: 1 / -1; }
  #progPanel  { grid-column: 1 / 7; }
  #chartPanel { grid-column: 7 / -1; }
  .sort-bar         { grid-column: 1 / 5; }
  .report-toggle    { grid-column: 5 / -1; }
  .report-body      { grid-column: 1 / -1; }
  #meterPanel       { grid-column: 1 / -1; }
  #list {
    grid-column: 1 / -1;
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
  }
  #list .day-grp { grid-column: 1 / -1; }

@media (min-width: 1380px) {
  #list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 420px) {
  :root { --header-h: 62px; --page-gutter: 10px; }
  .header-logo { width: 38px; height: 38px; }
  .header-title { font-size: 15px; }
  .header-add-btn { font-size: 11px; padding: 7px 10px; }
  .add-btn-label { display: none; }
  .sticky-inner { padding-top: 10px; }
  .wrap { padding-top: 12px; padding-bottom: 28px; }
  .stat-card { min-height: 104px; padding: 14px; }
  .card {
    grid-template-rows: 158px 136px 40px;
    height: 334px;
  }
  .card-top { padding: 12px 12px 10px; }
  .card-actions {
    padding: 8px 10px 10px; gap: 6px;
    grid-template-rows: 56px 42px;
  }
  .action-btn { min-height: 42px; font-size: 10px; padding: 7px 5px; }
  .msg-sheet { padding: 16px; border-radius: 20px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>
<body>

<!-- Offline banner -->
<div id="offlineBanner">📵 Ցանցը անջատ է · ցուցադրվում է կեշ</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
  <img class="header-logo" src="icon.png" alt="Plus One" onerror="this.style.display='none'">
  <div class="header-title">
    <span class="header-name">Գրասենյակներ</span>
    <span class="header-sub">Plus One Law Group</span>
  </div>
  <button class="header-add-btn" onclick="openAddTenant()" title="Ավելացնել վարձակալ">＋<span class="add-btn-label"> Վարձակալ</span></button>
  <button class="sync-pill" id="syncBtn" onclick="syncBtnClick()">
    <span class="sync-spin" id="syncSpinner">⟳</span>
    <span id="syncText">Բեռն...</span>
  </button>
  </div>
</div>

<!-- Sticky controls -->
<div class="sticky-zone">
  <div class="sticky-inner">
  <div class="control-row">
  <div class="month-row">
    <label>🏢</label>
    <select id="monthSel"></select>
    <span class="elec-month-badge" id="elecMonthBadge" title="Utility readings month">⚡ —</span>
    <span class="last-sync" id="lastSync"></span>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍 Գրս., անուն, հեռ...." autocomplete="off" autocorrect="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  </div>
  <div class="filter-chips">
    <button class="chip active" data-tab="all">Բոլորը</button>
    <button class="chip" data-tab="deposit">⟳ Դեպոզիտ</button>
    <button class="chip" data-tab="meter">⚡ Electricity</button>
    <button class="chip paid-toggle-chip" id="paidToggleBtn" onclick="toggleShowPaid()" style="display:none">
      <span id="paidToggleIcon"></span>
      <span id="paidToggleLabel">Ցույց տալ վճ.</span>
      <span class="paid-count-badge" id="paidCountBadge">0</span>
    </button>
  </div>
  </div>
</div>

<!-- Main content -->
<div class="wrap" id="mainWrap">
  <div id="ptrIndicator" class="ptr-indicator"></div>

  <!-- Stats -->
  <div id="statsGrid" class="stats-grid"></div>

  <!-- Sort -->
  <div class="sort-bar">
    <span>Կարգ.</span>
    <select id="sortSel" onchange="render()">
      <option value="day">Ամսաթիվ</option>
      <option value="floor">Floor</option>
      <option value="name">Անուն</option>
      <option value="rent">Վարձ ↓</option>
      <option value="unpaid">Չվճ. ↓</option>
    </select>
  </div>

  <!-- Financial report -->
  <button class="report-toggle" onclick="toggleReport()" id="reportToggle">
    📊 Ֆինանսական հաշվետվություն <span id="reportArrow">▾</span>
  </button>
  <div class="report-body" id="reportBody"></div>

  <!-- Meter Input Panel (shown when tab=meter) -->
  <div id="meterPanel" style="display:none">
    <div class="meter-header-row">
      <label class="meter-month-label" for="meterMonthSel">Electricity readings</label>
      <select id="meterMonthSel" class="meter-month-select" onchange="changeMeterMonth(this.value)"></select>
      <button class="meter-save-all-btn" onclick="saveAllMeters()">Save entered</button>
    </div>
    <div class="electricity-summary">
      <div>
        <div class="electricity-summary-label">Calculated total</div>
        <div class="electricity-summary-value" id="meterSummaryTotal">0 ֏</div>
      </div>
      <div class="electricity-summary-meta" id="meterSummaryMeta">0 readings</div>
    </div>
    <div id="meterList"></div>
  </div>

  <!-- Card list -->
  <div id="list"></div>
</div>

<!-- Edit modal -->
<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">✏️ Խմբագրել</h2>
    <div class="field"><label>Գրասենյակ / համար</label><input type="text" id="eA" autocomplete="off"></div>
    <input type="hidden" id="eN">
    <div class="field"><label>Հեռախոս / Username</label><input type="text" id="eP" autocomplete="off"></div>
    <div class="field"><label>Կապի ալիք</label>
      <select id="eCh">
        <option value="wa">WhatsApp</option>
        <option value="tg">Telegram</option>
        <option value="sms">SMS</option>
      </select>
    </div>
    <div class="field"><label>Վճ. ամսաթիվ (1–31)</label><input type="number" id="eD" min="1" max="31"></div>
    <div class="field"><label>Վարձ (֏)</label><input type="number" id="eR"></div>
    <div class="field"><label>📶 Internet</label>
      <select id="eInt">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>
    </div>

        <div class="field"><label>Ֆիզ. անձի անուն</label><input type="text" id="ePhysicalName" autocomplete="off"></div>
        <div class="field"><label>Անձնագիր</label><input type="text" id="ePhysicalPassport" autocomplete="off"></div>
        <div class="field"><label>Հասցե</label><input type="text" id="ePhysicalAddress" autocomplete="off"></div>
        <div class="field"><label>Տրված է</label><input type="text" id="ePhysicalIssuedFrom" autocomplete="off"></div>
        <div class="field"><label>Վավեր է մինչև</label><input type="date" id="ePhysicalValidUntil"></div>
      </div>
      <div id="legalFields" style="display:none">
        <div class="field"><label>Իրավ. անձի անվանում</label><input type="text" id="eLegalName" autocomplete="off"></div>
        <div class="field"><label>ՀՎՀՀ</label><input type="text" id="eHvhh" autocomplete="off"></div>
        <div class="field"><label>Իրավ. հասցե</label><input type="text" id="eLegalAddress" autocomplete="off"></div>
        <div class="field"><label>Գրանցման համար</label><input type="text" id="eRegistrationNumber" autocomplete="off"></div>
        <div class="field"><label>Տնօրենի անուն</label><input type="text" id="eCeoName" autocomplete="off"></div>
        <div class="field"><label>Տնօրենի անձնագիր</label><input type="text" id="eCeoPassport" autocomplete="off"></div>
        <div class="field"><label>Տնօրենի հասցե</label><input type="text" id="eCeoAddress" autocomplete="off"></div>
        <div class="field"><label>Տնօրենի տրված է</label><input type="text" id="eCeoIssuedFrom" autocomplete="off"></div>
        <div class="field"><label>Տնօրենի վավեր է մինչև</label><input type="date" id="eCeoValidUntil"></div>
      </div>
      <div class="field"><label>Պայմանագրի սկիզբ</label><input type="date" id="eStartDate"></div>
      <div class="field"><label>Պայմանագրի ավարտ</label><input type="date" id="eEndDate"></div>
      <div class="field"><label>Վճարման օր</label><input type="number" id="ePaymentDate" min="1" max="31"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Չեղ.</button>
      <button class="modal-end" id="modalEndBtn" onclick="endContract()" style="display:none">Ավարտել</button>
      <button class="modal-save" id="modalSaveBtn" onclick="saveEdit()">💾 Պահպանել</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- One global notification modal. Keeping it outside tenant cards prevents
     card pointer/long-press handlers from firing while the message scrolls. -->
<div class="msg-body" id="notificationModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="msg-sheet" id="notificationSheet">
    <div class="msg-sheet-head">
      <div class="msg-sheet-title" id="notificationTitle">Հաղորդագրություն</div>
      <button class="msg-close" id="notificationClose" type="button" aria-label="Փակել">×</button>
    </div>
    <div class="msg-text" id="notificationText"></div>
    <button class="copy-msg-btn" id="notificationCopy" type="button">📋 Պատճ. հաղ.</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════════════ */
var API = 'https://script.google.com/macros/s/AKfycbxN__cD8D70j5T6VrWXzrR0HdS8mmjDLVybfOu5888XzwRGHbggZSFvk3I4CBiYd5FN/exec';

/* Race fetch (no credentials) against JSONP — fastest winner used.
   fetch omits cookies so Google won't redirect the owner's account to auth. */
function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var settled = false;
    var pending = 2;
    var lastErr;
    function win(data) { if (!settled) { settled = true; resolve(data); } }
    function fail(err) { lastErr = err; if (--pending === 0 && !settled) reject(lastErr); }

    // ── fetch branch (no credentials) ──
    var ctrl = window.AbortController ? new AbortController() : null;
    var ft = ctrl ? setTimeout(function() { ctrl.abort(); }, 8000) : null;
    fetch(url, { credentials: 'omit', mode: 'cors', signal: ctrl ? ctrl.signal : undefined })
      .then(function(r) { clearTimeout(ft); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(win).catch(function(e) { clearTimeout(ft); fail(e); });

    // ── JSONP branch ──
    var cbName = '_cb' + Date.now() + Math.floor(Math.random() * 1e6);
    var script = document.createElement('script');
    var jt = setTimeout(function() { cleanup(); fail(new Error('JSONP timeout')); }, 12000);
    function cleanup() { clearTimeout(jt); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cbName] = function(data) { cleanup(); win(data); };
    script.onerror  = function() { cleanup(); fail(new Error('JSONP error')); };
    script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

function jsonpRetry(url, attempts) {
  attempts = attempts || 2;
  return jsonp(url).catch(function(err) {
    if (attempts <= 1) throw err;
    return jsonpRetry(url + (url.indexOf('?') === -1 ? '?' : '&') + '_retry=' + Date.now(), attempts - 1);
  });
}

function loadDataSnapshot() {
  var stamp = Date.now();
  // Keep requests small and sequential. Large combined JSONP responses were
  // unreliable on Android and could leave a new device with an empty screen.
  var result = { ok: true, generatedAt: new Date().toISOString() };
  return jsonpRetry(API + '?action=getTenants&_=' + stamp, 3)
    .then(function(t) {
      if (!t || !t.ok || !Array.isArray(t.tenants)) throw new Error('Tenant sync failed');
      result.tenants = t.tenants;
      return jsonpRetry(API + '?action=getElectricity&_=' + stamp, 3);
    })
    .then(function(e) {
      if (!e || !e.ok || !e.electricity) throw new Error('Electricity sync failed');
      result.electricity = e.electricity;
      return jsonpRetry(API + '?action=getAll&_=' + stamp, 3);
    })
    .then(function(p) {
      if (!p || !p.ok || !p.data) throw new Error('Payment sync failed');
      result.data = p.data;
      return result;
    })
    .catch(function(sequentialError) {
      // A single combined request is a useful fallback on mobile networks
      // that interrupt one of the three smaller JSONP requests.
      return jsonpRetry(API + '?action=getSnapshot&_=' + Date.now(), 2)
        .then(function(snapshot) {
          if (!snapshot || !snapshot.ok || !Array.isArray(snapshot.tenants) ||
              !snapshot.electricity || !snapshot.data) {
            throw sequentialError;
          }
          return snapshot;
        });
    });
}

function highlight(text, q) {
  if (!q) return text;
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');

}

function animateCounter(el, target, duration) {
  var start = 0;
  var startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    var p = Math.min((ts - startTime) / duration, 1);
    var ease = 1 - Math.pow(1 - p, 3);
    var cur = Math.round(start + (target - start) * ease);
    el.textContent = fmt(cur);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function monthFromDate(value) {

  if (isNaN(d.getTime())) return '';
  return MONTH_NAMES[d.getMonth()] + '-' + d.getFullYear();
}

function tenantStartMonth(t) {
  return String((t && t.startMonth) || '').trim() || monthFromDate(t && t.createdAt);

function skipsPreviousUtilities(t) {
  return !!(t && (t.skipPreviousUtilities === true || t.skipPreviousUtilities === 'yes'));
}

function utilityForTenant(t) {
  if (!t || skipsPreviousUtilities(t)) return {};
  return elecMap[t.apt] || {};

function tenantHasInternet(t, e) {
  if (!t || skipsPreviousUtilities(t)) return false;
  // Primary source: tenant sheet "Internet" column (Yes/No).

    var now = new Date();
    idx = now.getMonth();
    year = now.getFullYear();
  }
  idx -= 1;
  if (idx < 0) { idx = 11; year -= 1; }
  return MONTH_NAMES[idx] + '-' + year;
}

function nextMonthLabel(month) {
  var parts = String(month || curMonth || '').split('-');
  var idx = MONTH_NAMES.indexOf(parts[0]);
  var year = Number(parts[1]);
  if (idx < 0 || !year) {
    var now = new Date();
    idx = now.getMonth();
    year = now.getFullYear();
  }
  idx += 1;
  if (idx > 11) {
    idx = 0;
    year += 1;

function officeKey(value) {

function bindSingleDouble(btn, singleFn, doubleFn) {
  var timer = null;
  btn.addEventListener('click', function(ev) {
    ev.stopPropagation();
    var self = this;
    if (timer) return;
    timer = setTimeout(function() {
      timer = null;
      singleFn.call(self, ev);
    }, 230);
  });
  btn.addEventListener('dblclick', function(ev) {
    ev.preventDefault();
    ev.stopPropagation();
    if (timer) { clearTimeout(timer); timer = null; }
    doubleFn.call(this, ev);
  });
}

/* ═══════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════ */
function applyData(tJson, eJson, pJson) {
  if (tJson && tJson.ok && Array.isArray(tJson.tenants)) {
    tenants = tJson.tenants.filter(function(t) {
      return t && t.apt && String(t.name || '').trim().toLowerCase() !== 'ազատ';
    });
    tenants.forEach(function(t) { if (!st[t.apt]) st[t.apt] = { e: null, r: null }; });
  }

  if (eJson && eJson.ok) {
    var allElec = eJson.electricity || {};
    elecMap = {};
    // Merge new months into the existing set — never wipe months we already know about
    Object.keys(allElec).forEach(function(k) {
      var m = allElec[k].month;
      if (m && availableMonths.indexOf(m) === -1) availableMonths.push(m);
      var aptKey = officeKey(allElec[k].apt || k);
      elecMap[m + '_' + aptKey] = allElec[k];
      // Electricity always shows PREVIOUS month's readings
      if (m === elecMonth) {
        elecMap[aptKey] = allElec[k];
      }
    });
    // Always guarantee curMonth and elecMonth are present
    if (availableMonths.indexOf(curMonth) === -1) availableMonths.push(curMonth);
    if (availableMonths.indexOf(elecMonth) === -1) availableMonths.unshift(elecMonth);
    // Also pull any months from paymentsData we already have in memory
    Object.keys(paymentsData).forEach(function(k) {
      var m = (paymentsData[k] || {}).month;
      if (m && availableMonths.indexOf(m) === -1) availableMonths.push(m);
    });
    availableMonths.sort();
    buildMonthSelector();
  }

  if (pJson && pJson.ok) {
    paymentsData = pJson.data || {};
    // Merge months found in payments into availableMonths
    Object.keys(paymentsData).forEach(function(k) {
      var m = (paymentsData[k] || {}).month;
      if (m && availableMonths.indexOf(m) === -1) { availableMonths.push(m); }
    });
    availableMonths.sort();
    buildMonthSelector();
    tenants.forEach(function(t) { st[t.apt] = { e: null, r: null, rentPaidAt: '' }; });
    Object.keys(paymentsData).forEach(function(k) {
      var row = paymentsData[k];
      // Rent status comes from curMonth (ongoing month)
      if (row.month === curMonth && st[row.apt] !== undefined) {
        st[row.apt].r = row.rentStatus === 'unpaid' ? null : (row.rentStatus || null);
        st[row.apt].rentPaidAt = row.rentPaidAt || '';
        st[row.apt].rentPaidAmount = row.rentPaidAmount || 0;
      }
      // Electricity status comes from elecMonth (previous month)
      if (row.month === elecMonth && st[row.apt] !== undefined) {
        st[row.apt].e = row.elecStatus === 'unpaid' ? null : (row.elecStatus || null);
        st[row.apt].electricityPaidAt = row.electricityPaidAt || '';
        st[row.apt].electricityPaidAmount = row.electricityPaidAmount || 0;
        st[row.apt].internetAmount = row.internetAmount || 0;
      }
    });
  }
}

function syncBtnClick() {
  var btn = document.getElementById('syncBtn');
  if (btn && btn.classList.contains('err') && lastSyncError) {
    toast('✗ ' + lastSyncError, 'error');
    return;
  }
  refreshAll();
}

function refreshAll() {
  if (syncInFlight) return;
  syncInFlight = true;
  setSyncState('loading');
  if (!hasInitialData) showSkeletons();

  loadDataSnapshot().then(function(snapshot) {
    if (!snapshot || !snapshot.ok || !Array.isArray(snapshot.tenants) ||
        !snapshot.electricity || typeof snapshot.electricity !== 'object' ||
        !snapshot.data || typeof snapshot.data !== 'object') {
      throw new Error((snapshot && snapshot.error) || 'Incomplete data snapshot');
    }

    var tJson = { ok: true, tenants: snapshot.tenants };
    var eJson = { ok: true, electricity: snapshot.electricity };
    var pJson = { ok: true, data: snapshot.data };
    applyData(tJson, eJson, pJson);
    saveCache({ t: tJson, e: eJson, p: pJson, generatedAt: snapshot.generatedAt || '' });
    hasInitialData = true;
    lastSyncTime = Date.now();
    setConnectionWarning(false);
    setSyncState('ok');
    render();
    renderChart();
    syncInFlight = false;
  }).catch(function(err) {
    syncInFlight = false;
    console.error(err);
    lastSyncError = String(err && err.message ? err.message : err);
    setConnectionWarning(true);
    setSyncState('err');
    var c = loadCache();
    if (c) {
      try { applyData(c.data.t, c.data.e, c.data.p); render(); } catch(e) {}
      var cachedAt = c.ts ? formatDateTime(new Date(c.ts).toISOString()) : '';
      toast('📦 Offline data' + (cachedAt ? ' · ' + cachedAt : ''), 'error');
    } else {
      document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">↻</div>Չհաջողվեց բեռնել · սեղմեք Սինք</div>';
    }
  });
}

function reloadForMonth() {
  if (syncInFlight) return;
  syncInFlight = true;
  setSyncState('loading');
  loadDataSnapshot().then(function(snapshot) {
    if (!snapshot || !snapshot.ok || !Array.isArray(snapshot.tenants) ||
        !snapshot.electricity || !snapshot.data) throw new Error('Incomplete data snapshot');
    var tJson = { ok: true, tenants: snapshot.tenants };
    var eJson = { ok: true, electricity: snapshot.electricity };
    var pJson = { ok: true, data: snapshot.data };
    applyData(tJson, eJson, pJson);
    saveCache({ t: tJson, e: eJson, p: pJson, generatedAt: snapshot.generatedAt || '' });
    lastSyncTime = Date.now();
    setConnectionWarning(false);
    setSyncState('ok');
    render();
    renderChart();
    syncInFlight = false;
  }).catch(function() {
    setConnectionWarning(true);
    setSyncState('err');
    toast('Sync failed · showing unchanged data', 'error');
    render();
    syncInFlight = false;
  });
}

function showSkeletons() {

function buildMonthSelector() {
  var sel = document.getElementById('monthSel');
  // Always anchor to curMonth — never lose it when rebuilding the list
  var prev = curMonth;
  sel.innerHTML = '';
  availableMonths.forEach(function(m) {
    var o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === prev) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = function() {
    curMonth = this.value;
    // Electricity month is always one month before the selected rent month
    elecMonth = prevMonthLabel(curMonth);
    updateElecBadge();
    reloadForMonth();
  };
  updateElecBadge();
}

/* ═══════════════════════════════════════════════
   FINANCIAL CALCULATIONS
═══════════════════════════════════════════════ */
function calcFinancials() {
  var rentTotal = 0, rentCollected = 0;
  var elecTotal = 0, elecCollected = 0;
  var netTotal = 0, netCollected = 0;
  var depCount = 0, depAmt = 0;
  var unpaidList = [];

  tenants.forEach(function(t) {
    var s = st[t.apt] || {};
    var e = utilityForTenant(t);
    rentTotal += t.rent;
    if (isRentCovered(s.r)) { rentCollected += t.rent; }
    if (s.r === 'deposit') { depCount++; depAmt += t.rent; }
    if (!isRentCovered(s.r)) unpaidList.push(t);

    if (e.amdDay !== undefined) {
      var ea = e.amdDay + e.amdNight;
      elecTotal += ea;
      if (s.e === 'paid') elecCollected += ea;
    }
    // Internet is driven by the tenant sheet "Internet" column (Yes/No),
    // independent of whether an electricity reading exists for this month.
    if (tenantHasInternet(t, e)) {
      netTotal += 5000;
      if (s.e === 'paid') netCollected += 5000;
    }
  });

  unpaidList.sort(function(a, b) { return b.rent - a.rent; });

  return {
    rentTotal: rentTotal, rentCollected: rentCollected,
    elecTotal: elecTotal, elecCollected: elecCollected,
    netTotal: netTotal, netCollected: netCollected,
    depCount: depCount, depAmt: depAmt,
    totalDue: rentTotal + elecTotal + netTotal,
    totalCollected: rentCollected + elecCollected + netCollected,
    unpaidList: unpaidList
  };
}

/* ═══════════════════════════════════════════════
   CANVAS CHART
═══════════════════════════════════════════════ */
function renderChart() {
  var panel = document.getElementById('chartPanel');
  if (!panel) return;
  panel.style.display = '';
  var f = calcFinancials();
  var canvas = document.getElementById('reportChart');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.offsetWidth || canvas.parentElement.clientWidth - 28;
  var H = 130;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var categories = [
    { label: 'Վարձ', total: f.rentTotal, collected: f.rentCollected, color: '#10b981' },
    { label: 'Էլ.', total: f.elecTotal, collected: f.elecCollected, color: '#2563eb' },
    { label: 'Net', total: f.netTotal, collected: f.netCollected, color: '#7c3aed' }
  ];

  var padding = { top: 10, right: 10, bottom: 30, left: 10 };
  var bw = (W - padding.left - padding.right - 20) / categories.length;
  var maxH = H - padding.top - padding.bottom;

  ctx.clearRect(0, 0, W, H);

  categories.forEach(function(cat, i) {
    var x = padding.left + i * (bw + 10);
    var maxVal = Math.max(cat.total, 1);
    var collH = Math.round(maxH * cat.collected / maxVal);
    var totH = Math.round(maxH * Math.min(cat.total, maxVal) / maxVal);

    // Background bar
    ctx.fillStyle = '#eef2e8';
    ctx.beginPath();
    ctx.roundRect(x, padding.top, bw, totH, 6);
    ctx.fill();

    // Collected bar
    if (collH > 0) {
      ctx.fillStyle = cat.color;
      ctx.beginPath();
      ctx.roundRect(x, padding.top + totH - collH, bw, collH, 6);
      ctx.fill();
    }

    // Label
    ctx.fillStyle = '#5a6e45';
    ctx.font = '600 10px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(cat.label, x + bw / 2, H - padding.bottom + 14);

    // Amount
    var pct = cat.total ? Math.round(cat.collected / cat.total * 100) : 0;
    ctx.fillStyle = cat.color;
    ctx.font = '700 11px -apple-system,sans-serif';
    ctx.fillText(pct + '%', x + bw / 2, H - padding.bottom + 26);
  });

  var grandPct = f.totalDue ? Math.round(f.totalCollected / f.totalDue * 100) : 0;
  document.getElementById('chartPct').textContent = grandPct + '% հավ.';
}

/* ═══════════════════════════════════════════════
   PAYMENT AMOUNTS
═══════════════════════════════════════════════ */
function payAmounts(apt) {
  var t = tenants.find(function(x) { return x.apt === apt; }) || {};
  var e = utilityForTenant(t);
  var s = st[apt] || {};
  var rentAmt = Number(t.rent || 0);
  var elecAmt = Number(e.amdDay || 0) + Number(e.amdNight || 0);
  var netAmt = tenantHasInternet(t, e) ? 5000 : 0;
  return {
    rentAmount: rentAmt,
    electricityAmount: elecAmt,
    internetAmount: netAmt,
    totalDue: rentAmt + elecAmt + netAmt,
    rentPaidAmount: isRentCovered(s.r) ? rentAmt : 0,
    electricityPaidAmount: s.e === 'paid' ? elecAmt : 0,
    internetPaidAmount: s.e === 'paid' ? netAmt : 0,
    totalPaid: (isRentCovered(s.r) ? rentAmt : 0) +
               (s.e === 'paid' ? elecAmt + netAmt : 0)
  };
}

/* ═══════════════════════════════════════════════
   SAVE PAYMENT (with optimistic UI + rollback)
═══════════════════════════════════════════════ */
function savePayment(apt, tenantName, type, status, prevStatus) {
  apt = officeKey(apt);
  var card = document.querySelector('[data-card="' + apt + '"]');
  var amounts = payAmounts(apt);
  // Rent saves to curMonth; electricity saves to elecMonth (previous month)
  var saveMonth = (type === 'elec') ? elecMonth : curMonth;
  var now = nowIso();
  var rentPaidAt     = (type === 'rent' && isRentCovered(status)) ? now : '';
  var elecPaidAt     = (type === 'elec' && status === 'paid') ? now : '';
  var clearPaidAt    = (type === 'rent' && !isRentCovered(status)) ? '1' : '';
  var clearElecPaid  = (type === 'elec' && status !== 'paid') ? '1' : '';
  var url = API + '?action=update' +
    '&apt=' + encodeURIComponent(apt) +
    '&tenant=' + encodeURIComponent(tenantName) +
    '&type=' + encodeURIComponent(type) +
    '&status=' + encodeURIComponent(status || 'null') +
    '&month=' + encodeURIComponent(saveMonth) +
    '&rentAmount=' + amounts.rentAmount +
    '&electricityAmount=' + amounts.electricityAmount +
    '&internetAmount=' + amounts.internetAmount +
    '&totalDue=' + amounts.totalDue +
    '&rentPaidAmount=' + amounts.rentPaidAmount +
    '&electricityPaidAmount=' + amounts.electricityPaidAmount +
    '&internetPaidAmount=' + amounts.internetPaidAmount +
    '&totalPaid=' + amounts.totalPaid +
    '&rentPaidAt=' + encodeURIComponent(rentPaidAt) +
    '&electricityPaidAt=' + encodeURIComponent(elecPaidAt) +
    '&clearRentPaidAt=' + encodeURIComponent(clearPaidAt) +
    '&clearElecPaidAt=' + encodeURIComponent(clearElecPaid);

  jsonpRetry(url, 2).then(function(json) {
    if (json.ok) {
      var key = paymentKey(saveMonth, apt);
      paymentsData[key] = Object.assign({}, paymentsData[key] || {}, {
        month: saveMonth, apt: apt, tenant: tenantName,
        rentStatus: type === 'rent' ? (status || '') : ((paymentsData[key] || {}).rentStatus || ''),
        elecStatus: type === 'elec' ? (status || '') : ((paymentsData[key] || {}).elecStatus || ''),
        rentAmount: amounts.rentAmount, electricityAmount: amounts.electricityAmount, internetAmount: amounts.internetAmount,
        totalDue: amounts.totalDue, rentPaidAmount: amounts.rentPaidAmount,
        electricityPaidAmount: amounts.electricityPaidAmount, internetPaidAmount: amounts.internetPaidAmount, totalPaid: amounts.totalPaid,
        rentPaidAt: type === 'rent' ? rentPaidAt : ((paymentsData[key] || {}).rentPaidAt || ''),
        electricityPaidAt: type === 'elec' ? elecPaidAt : ((paymentsData[key] || {}).electricityPaidAt || '')
      });
      // Update live st so card re-renders with new timestamps immediately
      if (!st[apt]) st[apt] = {};
      if (type === 'rent') st[apt].rentPaidAt = rentPaidAt;
      if (type === 'elec') st[apt].electricityPaidAt = elecPaidAt;
      patchCard(apt);   // refresh paid-at timestamps on the card
      setSyncState('ok'); toast('✓ Պահ.', 'success');
    } else {
      if (type === 'elec') st[apt].e = prevStatus;
      else st[apt].r = prevStatus;
      patchCard(apt);
      setSyncState('err'); toast('✗ Սխ. — rollback', 'error');
    }
  }).catch(function() {
    if (type === 'elec') st[apt].e = prevStatus;
    else st[apt].r = prevStatus;
    patchCard(apt);
    setSyncState('err'); toast('✗ Ցանց — rollback', 'error');
  }).finally(function() {
  });
}

function savePrepayment(apt, tenantName) {
  apt = officeKey(apt);
  var tenant = tenants.find(function(x) { return x.apt === apt; }) || {};
  var rentAmt = Number(tenant.rent || 0);
  var targetMonth = nextMonthLabel(curMonth);
  var pKey = paymentKey(targetMonth, apt);
  var paidAt = nowIso();

  if (!rentAmt) { toast('No rent amount', 'error'); return; }

  // ── OPTIMISTIC UPDATE: update local state & re-render instantly ──
  var prevData = paymentsData[pKey] ? Object.assign({}, paymentsData[pKey]) : null;
  paymentsData[pKey] = Object.assign({}, paymentsData[pKey] || {}, {
    month: targetMonth, apt: apt, tenant: tenantName, rentStatus: 'prepaid',
    rentAmount: rentAmt, electricityAmount: 0, internetAmount: 0, totalDue: rentAmt,
    rentPaidAmount: rentAmt, electricityPaidAmount: 0, internetPaidAmount: 0, totalPaid: rentAmt,
    rentPaidAt: paidAt
  });
  if (availableMonths.indexOf(targetMonth) === -1) {
    availableMonths.push(targetMonth);
    buildMonthSelector();
  }
  render();
  triggerStatusAnim(apt);
  toast('💰 +1 Պահ. ' + targetMonth, 'success');
  setSyncState('loading');

  // ── BACKGROUND SYNC ──
  var url = API + '?action=update' +
    '&apt=' + encodeURIComponent(apt) +
    '&tenant=' + encodeURIComponent(tenantName) +
    '&type=rent' +
    '&status=prepaid' +
    '&month=' + encodeURIComponent(targetMonth) +
    '&rentAmount=' + rentAmt +
    '&electricityAmount=0' +
    '&internetAmount=0' +
    '&totalDue=' + rentAmt +
    '&rentPaidAmount=' + rentAmt +
    '&electricityPaidAmount=0' +
    '&internetPaidAmount=0' +
    '&totalPaid=' + rentAmt +
    '&rentPaidAt=' + encodeURIComponent(paidAt);

  jsonpRetry(url, 2).then(function(json) {
    if (!json.ok) throw new Error(json.error || 'Save failed');
    setSyncState('ok');
  }).catch(function() {
    // Rollback on failure
    if (prevData) paymentsData[pKey] = prevData;
    else delete paymentsData[pKey];
    setSyncState('err');
    toast('✗ +1 Սխ. — rollback', 'error');
    render();
    triggerStatusAnim(apt);
  });
}


function deletePrepayment(apt, tenantName) {

function clearRentPayment(apt, tenantName) {
