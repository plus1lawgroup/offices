/* ═══════════════════════════════════════════════
   STATUS CYCLE
═══════════════════════════════════════════════ */
var ECYCLE = ['paid', null];
var RCYCLE = ['paid', null];

function cycleE(apt, name) {
  var prev = st[apt] ? st[apt].e : null;
  var i = ECYCLE.indexOf(prev);
  var next = ECYCLE[(i + 1) % ECYCLE.length];
  if (!st[apt]) st[apt] = {};
  st[apt].e = next;
  savePayment(apt, name, 'elec', next, prev);
  patchCard(apt);
}

function cycleR(apt, name) {
  var prev = st[apt] ? st[apt].r : null;
  var i = RCYCLE.indexOf(prev);
  var next = RCYCLE[(i + 1) % RCYCLE.length];
  if (!st[apt]) st[apt] = {};
  st[apt].r = next;
  savePayment(apt, name, 'rent', next, prev);
  patchCard(apt);
}

function setStatus(apt, name, type, status) {
  var prev = st[apt] ? (type === 'elec' ? st[apt].e : st[apt].r) : null;
  if (!st[apt]) st[apt] = {};
  if (type === 'elec') st[apt].e = status;
  else st[apt].r = status;
  savePayment(apt, name, type, status, prev);
  patchCard(apt);
}

function toggleDeposit(apt, name) {
  var prev = st[apt] ? st[apt].r : null;
  var next = prev === 'deposit' ? null : 'deposit';
  if (!st[apt]) st[apt] = {};
  st[apt].r = next;
  savePayment(apt, name, 'rent', next, prev);
  patchCard(apt);
}

/* ═══════════════════════════════════════════════
   SURGICAL CARD PATCH  (no full re-render)
   Updates only the 4 elements that change on a
   status tap: rent btn, elec btn, chips, paid-at
═══════════════════════════════════════════════ */
function patchCard(apt) {
  var card = document.querySelector('[data-card="' + apt + '"]');
  if (!card) return;          // card not in DOM (hidden/filtered) → skip

  var t = tenants.find(function(x) { return x.apt === apt; }) || {};
  var s = st[apt] || {};
  var e = utilityForTenant(t);
  var hasE = e.amdDay !== undefined;
  var hasInternet = tenantHasInternet(t, e);

  // ── Rent button ──────────────────────────────
  var rBtn = card.querySelector('[data-type="r"]');
  if (rBtn) {
    var rentBtnStatus = s.r === 'paid' ? s.r : '';
    rBtn.className = 'action-btn' + (rentBtnStatus ? ' a-r' + rentBtnStatus : '');
    rBtn.innerHTML = rentBtnStatus ? rLabel(rentBtnStatus) : '🏢 Rent';
  }

  // ── Elec button ──────────────────────────────
  var eBtn = card.querySelector('[data-type="e"]');
  if (eBtn) {
    var elecBtnStatus = s.e === 'paid' ? s.e : '';
    eBtn.className = 'action-btn' + (elecBtnStatus ? ' a-e' + elecBtnStatus : '');
    eBtn.innerHTML = elecBtnStatus ? eLabel(elecBtnStatus) : '⚡ Electricity';
  }

  var depositBtn = card.querySelector('[data-deposit]');
  if (depositBtn) {
    depositBtn.className = 'action-btn deposit-btn' + (s.r === 'deposit' ? ' a-rdeposit is-active' : '');
    depositBtn.innerHTML = s.r === 'deposit' ? '⟳ Deposit<small>saved</small>' : '⟳ Deposit<small>this month</small>';
  }

  // ── Status chips ─────────────────────────────
  var statusRow = card.querySelector('.status-row');
  if (statusRow) {
    var rChip = s.r ? '<span class="s-chip s-' + s.r + '">' + rLabel(s.r) + '</span>' : '';
    var eChip = hasE && s.e ? '<span class="s-chip s-' + s.e + '">' + eLabel(s.e) + '</span>' : '';
    statusRow.innerHTML = rChip + eChip;
  }

  // ── Paid-at table ────────────────────────────
  var paidAtEl = card.querySelector('.paid-at-table');
  var rentPaidText = paidAtLabel(s.rentPaidAt || (paymentRow(curMonth,  apt) || {}).rentPaidAt);
  var elecPaidText = paidAtLabel(s.electricityPaidAt || (paymentRow(elecMonth, apt) || {}).electricityPaidAt);
  var netPaidText  = (hasInternet && elecPaidText) ? elecPaidText : '';
  var newPaidAt = (rentPaidText || elecPaidText || netPaidText) ?
    '<div class="paid-at-table">' +
      (rentPaidText ? '<div class="pa-row pa-rent"><span class="pa-icon">🏢</span><span class="pa-time">' + rentPaidText + '</span></div>' : '') +
      (elecPaidText ? '<div class="pa-row pa-elec"><span class="pa-icon">⚡</span><span class="pa-time">' + elecPaidText + '</span></div>' : '') +
      (netPaidText  ? '<div class="pa-row pa-net"><span class="pa-icon">📶</span><span class="pa-time">'  + netPaidText  + '</span></div>' : '') +
    '</div>' : '';

  if (paidAtEl) {
    paidAtEl.outerHTML = newPaidAt || '';
  } else if (newPaidAt) {
    // Insert before status-row
    var sr = card.querySelector('.status-row');
    if (sr) sr.insertAdjacentHTML('beforebegin', newPaidAt);
  }

  // ── Overdue flash ────────────────────────────
  var today = new Date().getDate();
  var isOverdue = t.day > 0 && t.day < today && !isRentCovered(s.r);
  card.classList.toggle('overdue-flash', isOverdue);

}

function triggerStatusAnim(apt) { /* no-op — card pop removed */ }

  setInputValue('ePhysicalName', t.physicalName || t.name || '');
  setInputValue('ePhysicalPassport', t.physicalPassport || '');
  setInputValue('ePhysicalAddress', t.physicalAddress || '');
  setInputValue('ePhysicalIssuedFrom', t.physicalIssuedFrom || '');
  setInputValue('ePhysicalValidUntil', dateInputValue(t.physicalValidUntil));
  setInputValue('eLegalName', t.legalName || t.name || '');
  setInputValue('eHvhh', t.hvhh || '');
  setInputValue('eLegalAddress', t.legalAddress || '');
  setInputValue('eRegistrationNumber', t.registrationNumber || '');
  setInputValue('eCeoName', t.ceoName || '');
  setInputValue('eCeoPassport', t.ceoPassport || '');
  setInputValue('eCeoAddress', t.ceoAddress || '');
  setInputValue('eCeoIssuedFrom', t.ceoIssuedFrom || '');
  setInputValue('eCeoValidUntil', dateInputValue(t.ceoValidUntil));
  setInputValue('eStartDate', dateInputValue(t.startDate));
  setInputValue('eEndDate', dateInputValue(t.endDate));
  setInputValue('ePaymentDate', t.paymentDate || t.day || '');
  updateEntityFields();
}

function dateInputValue(value) {
  if (!value) return '';
  var d = new Date(value);
  if (isNaN(d.getTime())) return String(value).slice(0, 10);
  return d.toISOString().slice(0, 10);
}

function tenantNameFromContractFields() {
  var type = document.getElementById('eEntityType').value;
  var legalName = document.getElementById('eLegalName').value.trim();
  var physicalName = document.getElementById('ePhysicalName').value.trim();
  return type === 'legal' ? legalName : physicalName;
}

function openEdit(apt) {
  modalMode = 'edit';
  editingApt = apt;
  var t = tenants.find(function(x) { return x.apt === apt; });
  if (!t) return;
  document.getElementById('modalTitle').textContent = '✏️ Գրս. ' + apt;
  document.getElementById('eA').value = t.apt;
  document.getElementById('eA').disabled = true;
  document.getElementById('eN').value = t.name;
  document.getElementById('eP').value = t.phone;
  document.getElementById('eCh').value = t.ch;
  document.getElementById('eD').value = t.day || '';
  document.getElementById('eR').value = t.rent;

  document.getElementById('modalEndBtn').style.display = 'none';
}

function saveEdit() {
  var aptValue = officeKey(modalMode === 'add' ? document.getElementById('eA').value : editingApt);
  if (!aptValue) { toast('Գրասենյակի համարը պարտադիր է', 'error'); return; }
  if (modalMode === 'add' && tenants.some(function(x) { return x.apt === aptValue; })) {
    toast('Այդ գրասենյակը արդեն կա', 'error');
    return;
  }
  var btn = document.getElementById('modalSaveBtn');
  btn.textContent = '⟳'; btn.disabled = true;
  var derivedName = tenantNameFromContractFields();
  var fields = {
    name: derivedName,
    phone: document.getElementById('eP').value.trim(),
    ch: document.getElementById('eCh').value,
    day: document.getElementById('eD').value,
    rent: document.getElementById('eR').value,
    internet: document.getElementById('eInt').value,
    skipPreviousUtilities: document.getElementById('eSkipPrevUtil').value,
    startMonth: modalMode === 'add' ? curMonth : '',
    entityType: document.getElementById('eEntityType').value,
    physicalName: document.getElementById('ePhysicalName').value.trim(),
    physicalPassport: document.getElementById('ePhysicalPassport').value.trim(),
    physicalAddress: document.getElementById('ePhysicalAddress').value.trim(),
    physicalIssuedFrom: document.getElementById('ePhysicalIssuedFrom').value.trim(),
    physicalValidUntil: document.getElementById('ePhysicalValidUntil').value,
    legalName: document.getElementById('eLegalName').value.trim(),
    hvhh: document.getElementById('eHvhh').value.trim(),
    legalAddress: document.getElementById('eLegalAddress').value.trim(),
    registrationNumber: document.getElementById('eRegistrationNumber').value.trim(),
    ceoName: document.getElementById('eCeoName').value.trim(),
    ceoPassport: document.getElementById('eCeoPassport').value.trim(),
    ceoAddress: document.getElementById('eCeoAddress').value.trim(),
    ceoIssuedFrom: document.getElementById('eCeoIssuedFrom').value.trim(),
    ceoValidUntil: document.getElementById('eCeoValidUntil').value,
    startDate: document.getElementById('eStartDate').value,
    endDate: document.getElementById('eEndDate').value,
    paymentDate: document.getElementById('ePaymentDate').value || document.getElementById('eD').value
  };
  if (!fields.name || !fields.rent) {
    toast('Անունը և վարձը պարտադիր են', 'error');
    btn.textContent = '💾 Պահ.'; btn.disabled = false;
    return;
  }
  saveTenant(aptValue, fields).then(function(ok) {
    if (ok) {
      var t = tenants.find(function(x) { return x.apt === aptValue; });
      if (t) {
        Object.assign(t, fields);
        t.name = fields.name; t.phone = fields.phone; t.ch = fields.ch; t.day = Number(fields.day); t.rent = Number(fields.rent); t.internet = (fields.internet === 'yes'); t.skipPreviousUtilities = fields.skipPreviousUtilities;
      } else {
        tenants.push(Object.assign({}, fields, { apt: aptValue, name: fields.name, phone: fields.phone, ch: fields.ch, day: Number(fields.day), rent: Number(fields.rent), internet: (fields.internet === 'yes'), startMonth: fields.startMonth }));
        if (!st[aptValue]) st[aptValue] = { e: null, r: null };
      }
      if (elecMap[aptValue]) elecMap[aptValue].internet = (fields.internet === 'yes');
      toast('✓ Պահ.', 'success');
      closeModal(); render();
    } else { toast('✗ Սխ.', 'error'); }
    btn.textContent = '💾 Պահ.'; btn.disabled = false;
  });
}

function endContract() {
  if (modalMode !== 'edit' || !editingApt) return;
  var t = tenants.find(function(x) { return x.apt === editingApt; });
  if (!t) return;
  var today = new Date().toISOString().slice(0, 10);
  if (!document.getElementById('eEndDate').value) {
    document.getElementById('eEndDate').value = today;
  }
  var derivedName = tenantNameFromContractFields();
  var fields = {
    name: derivedName || t.name,
    phone: document.getElementById('eP').value.trim(),
    ch: document.getElementById('eCh').value,
    day: document.getElementById('eD').value,
    rent: document.getElementById('eR').value,
    internet: document.getElementById('eInt').value,
    skipPreviousUtilities: document.getElementById('eSkipPrevUtil').value,
    startMonth: '',
    active: 'no',
    entityType: document.getElementById('eEntityType').value,
    physicalName: document.getElementById('ePhysicalName').value.trim(),
    physicalPassport: document.getElementById('ePhysicalPassport').value.trim(),
    physicalAddress: document.getElementById('ePhysicalAddress').value.trim(),
    physicalIssuedFrom: document.getElementById('ePhysicalIssuedFrom').value.trim(),
    physicalValidUntil: document.getElementById('ePhysicalValidUntil').value,
    legalName: document.getElementById('eLegalName').value.trim(),
    hvhh: document.getElementById('eHvhh').value.trim(),
    legalAddress: document.getElementById('eLegalAddress').value.trim(),
    registrationNumber: document.getElementById('eRegistrationNumber').value.trim(),
    ceoName: document.getElementById('eCeoName').value.trim(),
    ceoPassport: document.getElementById('eCeoPassport').value.trim(),
    ceoAddress: document.getElementById('eCeoAddress').value.trim(),
    ceoIssuedFrom: document.getElementById('eCeoIssuedFrom').value.trim(),
    ceoValidUntil: document.getElementById('eCeoValidUntil').value,
    startDate: document.getElementById('eStartDate').value,
    endDate: document.getElementById('eEndDate').value,
    paymentDate: document.getElementById('ePaymentDate').value || document.getElementById('eD').value
  };
  var btn = document.getElementById('modalEndBtn');
  btn.textContent = '⟳'; btn.disabled = true;
  saveTenant(editingApt, fields).then(function(ok) {
    btn.textContent = 'Ավարտել'; btn.disabled = false;
    if (!ok) { toast('✗ Սխ.', 'error'); return; }
    tenants = tenants.filter(function(x) { return x.apt !== editingApt; });
    toast('Պայմ. ավարտված է', 'success');
    closeModal();
    render();
  });
}

   SEND MESSAGE
═══════════════════════════════════════════════ */
function sendMsg(apt) {
  var t = tenants.find(function(x) { return x.apt === apt; });
  if (!t) return;
  var msg = makeMsg(apt);
  if (!msg) { toast('⚡ Տվյ. չկա', 'error'); return; }
  var encoded = encodeURIComponent(msg);
  var phone = t.phone, ch = t.ch;
  if (ch === 'wa') { window.open('https://wa.me/' + phone.replace(/[^0-9]/g, '') + '?text=' + encoded, '_blank'); }
  else if (ch === 'tg') { window.open('https://t.me/' + phone.replace('@', ''), '_blank'); }
  else if (ch === 'sms') { window.open('sms:' + phone.replace(/[^0-9+]/g, '') + '?body=' + encoded, '_blank'); }
  else { window.open('https://wa.me/?text=' + encoded, '_blank'); }
}

function copyMsg(apt) {
  var m = makeMsg(apt);
  if (!m) { toast('⚡ Տվ. չկա', 'error'); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(m).then(function() { toast('✓ Պատճ.', 'success'); });
  } else { toast('✗ Clipboard', 'error'); }
}

function openNotification(apt) {
  var modal = document.getElementById('notificationModal');
  var text = makeMsg(apt);
  if (!modal || !text) {
    toast('⚡ Տվ. չկա', 'error');
    return;
  }
  notificationApt = apt;
  document.getElementById('notificationTitle').textContent = 'Հաղորդագրություն · Գրաս. ' + apt;
  document.getElementById('notificationText').textContent = text;
  document.getElementById('notificationSheet').scrollTop = 0;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.classList.add('notification-open');
}

function closeNotification() {
  var modal = document.getElementById('notificationModal');
  if (!modal || !modal.classList.contains('open')) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('notification-open');
  notificationApt = '';
}

document.getElementById('notificationClose').addEventListener('click', function(ev) {
  ev.preventDefault();
  ev.stopPropagation();
  closeNotification();
});
document.getElementById('notificationCopy').addEventListener('click', function(ev) {
  ev.preventDefault();
  ev.stopPropagation();
  if (notificationApt) copyMsg(notificationApt);
});
document.getElementById('notificationModal').addEventListener('click', function(ev) {
  if (ev.target === this) closeNotification();
});
document.getElementById('notificationSheet').addEventListener('click', function(ev) {
  ev.stopPropagation();
});
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') closeNotification();
});

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function render() {
  if (!tenants.length) {
    document.getElementById('list').innerHTML =
      '<div class="empty"><div class="empty-icon">🏢</div>Tenant data is empty or unavailable</div>';
    return;
  }
  var q = (document.getElementById('search').value || '').toLowerCase().trim();
  var today = new Date().getDate();
  var isElecPeriod = today >= 1 && today <= 5;
  var sortBy = document.getElementById('sortSel').value;

  // Filter
  var list = tenants.filter(function(t) {
    var mq = !q ||
      t.apt.toLowerCase().includes(q) ||
      t.name.toLowerCase().includes(q) ||
      (t.phone && t.phone.includes(q));
    if (!mq) return false;
    var s = st[t.apt] || {};
    if (curTab === 'elec') return utilityForTenant(t).amdDay !== undefined;
    if (curTab === 'rent') return true;
    if (curTab === 'unpaid') return !isRentCovered(s.r) || (s.e !== 'paid' && utilityForTenant(t).amdDay !== undefined);
    if (curTab === 'today') return t.day === today || (isElecPeriod && utilityForTenant(t).amdDay !== undefined);
    if (curTab === 'deposit') return s.r === 'deposit';
    if (curTab === 'internet') return tenantHasInternet(t, utilityForTenant(t));
    return true;
  });

  // ── Hide fully-paid cards ───────────────────────
  // "Fully paid" = rent covered AND (no elec subscription OR elec paid)
  function isFullyPaid(t) {
    var s = st[t.apt] || {};
    var rentOk = isRentCovered(s.r);
    var elecOk = utilityForTenant(t).amdDay === undefined || s.e === 'paid';
    return rentOk && elecOk;
  }
  var paidCards  = list.filter(isFullyPaid);
  var paidCount  = paidCards.length;
  var visibleList = showPaid ? list : list.filter(function(t) { return !isFullyPaid(t); });

  // Update the toggle bar
  var toggleBtn  = document.getElementById('paidToggleBtn');
  var toggleLabel = document.getElementById('paidToggleLabel');
  var toggleIcon  = document.getElementById('paidToggleIcon');
  var countBadge  = document.getElementById('paidCountBadge');
  if (paidCount > 0 && curTab !== 'unpaid') {
    toggleBtn.style.display = '';
    countBadge.textContent  = paidCount;
    if (showPaid) {
      toggleBtn.classList.add('active');
      toggleIcon.textContent  = '✓ ';
      toggleLabel.textContent = 'Թաքցնել վճ.';
    } else {
      toggleBtn.classList.remove('active');
      toggleIcon.textContent  = '';
      toggleLabel.textContent = 'Ցույց տալ վճ.';
    }
  } else {
    toggleBtn.style.display = 'none';
  }

  // Sort (operate on visibleList)
  visibleList.sort(function(a, b) {
    if (sortBy === 'name') return a.name.localeCompare(b.name, 'hy');
    if (sortBy === 'rent') return b.rent - a.rent;
    if (sortBy === 'unpaid') {
      var sa = st[a.apt] || {}, sb = st[b.apt] || {};
      var ua = !isRentCovered(sa.r) ? a.rent : 0;
      var ub = !isRentCovered(sb.r) ? b.rent : 0;
      return ub - ua;
    }
    if (sortBy === 'floor') {
      var fa = aptFloor(a.apt), fb = aptFloor(b.apt);
      if (fa === null && fb === null) return a.apt.localeCompare(b.apt);
      if (fa === null) return 1;
      if (fb === null) return -1;
      if (fa !== fb) return parseInt(fa, 10) - parseInt(fb, 10);
      return parseInt(a.apt.slice(-2), 10) - parseInt(b.apt.slice(-2), 10);
    }
    return (a.day || 99) - (b.day || 99);
  });

  // ── Stats ────────────────────────────────────
  var eAll  = tenants.filter(function(t){ return utilityForTenant(t).amdDay !== undefined; });
  var ePaid = eAll.filter(function(t){ return st[t.apt] && st[t.apt].e === 'paid'; });
  var netAll  = tenants.filter(function(t){ return tenantHasInternet(t, utilityForTenant(t)); });
  var netPaid = netAll.filter(function(t){ return st[t.apt] && st[t.apt].e === 'paid'; });
  var f = calcFinancials();

  var ep = eAll.length ? Math.round(ePaid.length / eAll.length * 100) : 0;
  var rp = tenants.length ? Math.round((tenants.filter(function(t){ var s=st[t.apt]||{}; return isRentCovered(s.r); }).length) / tenants.length * 100) : 0;
  var np = netAll.length ? Math.round(netPaid.length / netAll.length * 100) : 0;

  var statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML =
    statCard('🏢 Rent', fmt(f.rentTotal) + ' ֏', fmt(f.rentCollected) + ' ֏ collected', 'c-green', '', fmt(f.rentTotal - f.rentCollected) + ' ֏ remaining') +
    statCard('⚡ Electricity', fmt(f.elecTotal) + ' ֏', fmt(f.elecCollected) + ' ֏ collected', 'c-amber', '', fmt(f.elecTotal - f.elecCollected) + ' ֏ remaining') +
    statCard('📶 Internet', fmt(f.netTotal) + ' ֏', fmt(f.netCollected) + ' ֏ collected', 'c-purple', '', fmt(f.netTotal - f.netCollected) + ' ֏ remaining') +
    statCard('💰 Total', fmt(f.totalDue) + ' ֏', fmt(f.totalCollected) + ' ֏ collected', 'c-blue', '', fmt(f.totalDue - f.totalCollected) + ' ֏ remaining');

  // Trigger counter animation
  statsGrid.querySelectorAll('.stat-val').forEach(function(el) {
    if (el.textContent.indexOf('/') !== -1) return;
    var raw = el.textContent.replace(/[^\d]/g, '');
    if (raw) {
      var num = parseInt(raw, 10);
      if (num > 0) animateCounter(el, num, 600);
    }
  });

  // Update report if open
  if (reportOpen) renderReportBody();

  // ── Card list ────────────────────────────────
  var el = document.getElementById('list');
  el.innerHTML = '';
  if (!visibleList.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">' + (paidCount > 0 ? '✓' : '🔍') + '</div>' + (paidCount > 0 ? 'Բոլորը վճ. ✓' : 'Արդյ. չկա') + '</div>';
    return;
  }

  var lastDay = null;
  var lastFloor = null;
  visibleList.forEach(function(t) {
    var e = utilityForTenant(t);
    var hasE = e.amdDay !== undefined;
    var s = st[t.apt] || { e: null, r: null };
    var hasInternet = tenantHasInternet(t, e);   // needed early for netPaidText
    var nextPrepay = paymentRow(nextMonthLabel(curMonth), t.apt);
    var hasNextPrepay = !!(nextPrepay && nextPrepay.rentStatus === 'prepaid');
    var rentPaidText  = paidAtLabel(s.rentPaidAt || (paymentRow(curMonth,  t.apt) || {}).rentPaidAt);
    var elecPaidText  = paidAtLabel(s.electricityPaidAt || (paymentRow(elecMonth, t.apt) || {}).electricityPaidAt);
    // Internet is paid together with electricity — same timestamp
    var netPaidText   = (hasInternet && elecPaidText) ? elecPaidText : '';
    var isToday = t.day === today;
    var isOverdue = t.day > 0 && t.day < today && !isRentCovered(s.r);
    var elecDue = hasE && isElecPeriod && s.e !== 'paid';
    // Floor group header
    if (!q && sortBy === 'floor') {
      var tFloor = aptFloor(t.apt);
      var floorKey = tFloor !== null ? tFloor : '__other__';
      if (floorKey !== lastFloor) {
        lastFloor = floorKey;
        var fg = document.createElement('div');
        fg.className = 'day-grp';
        fg.textContent = tFloor !== null ? 'Floor ' + parseInt(tFloor, 10) : 'Other';
        el.appendChild(fg);
      }
    }
    // Day group header
    if (!q && curTab !== 'elec' && sortBy === 'day' && t.day !== lastDay) {
      lastDay = t.day;
      var dg = document.createElement('div');
      dg.className = 'day-grp' + (isToday ? ' today-grp' : '');
      dg.innerHTML = '<span class="today-date-icon">' + t.day + '</span> ' + t.day + '-ին' +
        (isToday ? ' <span class="day-grp-badge">Այսօր</span>' : '');
      el.appendChild(dg);
    }

    // Amounts display
    var elecAmt = e.amdDay !== undefined ? e.amdDay + e.amdNight : 0;
    var utilTotal = elecAmt + (hasInternet ? 5000 : 0);

    // Status chips
    var rChip = s.r ? '<span class="s-chip s-' + s.r + '">' + rLabel(s.r) + '</span>' : '';
    var eChip = hasE && s.e ? '<span class="s-chip s-' + s.e + '">' + eLabel(s.e) + '</span>' : '';

    // Action button classes
    var elecBtnStatus = s.e === 'paid' ? s.e : '';
    var eCls = 'action-btn' + (elecBtnStatus ? ' a-e' + elecBtnStatus : '');
    var rentBtnStatus = s.r === 'paid' ? s.r : '';
    var rCls = 'action-btn' + (rentBtnStatus ? ' a-r' + rentBtnStatus : '');
    var dCls = 'action-btn deposit-btn' + (s.r === 'deposit' ? ' a-rdeposit is-active' : '');

    var nameHl = highlight(t.name, q);
    var phoneHl = highlight(t.phone || '', q);
    var aptHl = highlight('Գրս. ' + t.apt, q);

    var div = document.createElement('div');
    div.className = 'card' + (isOverdue ? ' overdue-flash' : '');
    div.setAttribute('data-card', t.apt);

    div.innerHTML =
      '<div class="card-top" data-cardtop="' + t.apt + '">' +
        '<div class="card-left">' +
          '<div class="apt-label">' + aptHl + ' ' + chBadge(t.ch) + (elecDue ? ' <span class="elec-alert">⚡!</span>' : '') + '</div>' +
          '<div class="apt-name">' + nameHl + '</div>' +
          '<div class="apt-phone">' + phoneHl + '</div>' +
          (hasE ? '<div class="apt-detail">⚡ ' + fmt(elecAmt) + (hasInternet ? ' + 📶 5k' : '') + ' = ' + fmt(utilTotal) + ' ֏</div>' : (hasInternet ? '<div class="apt-detail">📶 Internet = 5,000 ֏</div>' : '')) +
        '</div>' +
        '<div class="card-right">' +
          '<div class="rent-amt">' + fmt(t.rent) + ' ֏</div>' +
          '<div class="rent-sub">Վճ. ' + t.day + '-ին</div>' +
          (rentPaidText || elecPaidText || netPaidText ?
            '<div class="paid-at-table">' +
              (rentPaidText  ? '<div class="pa-row pa-rent"><span class="pa-icon">🏢</span><span class="pa-time">' + rentPaidText  + '</span></div>' : '') +
              (elecPaidText  ? '<div class="pa-row pa-elec"><span class="pa-icon">⚡</span><span class="pa-time">' + elecPaidText  + '</span></div>' : '') +
              (netPaidText   ? '<div class="pa-row pa-net"><span class="pa-icon">📶</span><span class="pa-time">'  + netPaidText   + '</span></div>' : '') +
            '</div>'
          : '') +
          '<div class="status-row">' + rChip + eChip + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        (hasE ? '<button class="' + eCls + '" data-apt="' + t.apt + '" data-name="' + t.name + '" data-type="e">' + (elecBtnStatus ? eLabel(elecBtnStatus) : '⚡ Electricity') + '</button>' : '') +
        '<button class="' + rCls + '" data-apt="' + t.apt + '" data-name="' + t.name + '" data-type="r">' + (rentBtnStatus ? rLabel(rentBtnStatus) : '🏢 Rent') + '</button>' +
        '<button class="' + dCls + '" data-deposit="' + t.apt + '" data-name="' + t.name + '">' + (s.r === 'deposit' ? '⟳ Deposit<small>saved</small>' : '⟳ Deposit<small>this month</small>') + '</button>' +
        '<button class="action-btn prepay-btn' + (hasNextPrepay ? ' is-active' : '') + '" data-prepay="' + t.apt + '" data-name="' + t.name + '" data-active="' + (hasNextPrepay ? '1' : '0') + '" title="Click to save or remove next month prepayment">' + (hasNextPrepay ? '+1 Saved<small>click: remove</small>' : '+1 Prepay<small>next month</small>') + '</button>' +
        '<div class="quick-btns">' +
          '<button class="icon-btn" data-edit="' + t.apt + '" title="Խմ.">✏️</button>' +
          (hasE ? '<button class="icon-btn" data-copy="' + t.apt + '" title="Պատճ.">📋</button>' : '') +
          '<button class="send-btn" data-send="' + t.apt + '" title="Ուղ.">📤</button>' +
        '</div>' +
      '</div>' +
      (hasE ?
        '<button class="msg-toggle" data-message="' + t.apt + '">Հաղ. ▾</button>'
        : '<div class="no-elec">⚡ Առ. աբ.</div>');

    // Events
    div.querySelectorAll('[data-type]').forEach(function(btn) {
      if (btn.dataset.type === 'r') {
        bindSingleDouble(btn, function() {
          cycleR(this.dataset.apt, this.dataset.name);
        }, function() {
          clearRentPayment(this.dataset.apt, this.dataset.name);
        });
      } else {
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          cycleE(this.dataset.apt, this.dataset.name);
        });
      }
    });
    div.querySelectorAll('[data-edit]').forEach(function(btn) {
      btn.addEventListener('click', function(ev) { ev.stopPropagation(); openEdit(this.dataset.edit); });
    });
    div.querySelectorAll('[data-deposit]').forEach(function(btn) {
      btn.addEventListener('click', function(ev) {
        ev.stopPropagation();
        toggleDeposit(this.dataset.deposit, this.dataset.name);
      });
    });
    div.querySelectorAll('[data-prepay]').forEach(function(btn) {
      btn.addEventListener('click', function(ev) {
        ev.stopPropagation();
        if (this.dataset.active === '1') deletePrepayment(this.dataset.prepay, this.dataset.name);
        else savePrepayment(this.dataset.prepay, this.dataset.name);
      });
    });
    div.querySelectorAll('[data-send]').forEach(function(btn) {
      btn.addEventListener('click', function(ev) { ev.stopPropagation(); sendMsg(this.dataset.send); });
    });
    div.querySelectorAll('[data-copy]').forEach(function(btn) {
      btn.addEventListener('click', function(ev) { ev.stopPropagation(); copyMsg(this.dataset.copy); });
    });

    // Open the single global notification modal.
    var toggle = div.querySelector('.msg-toggle');
    if (toggle) {
      toggle.addEventListener('click', function(ev) {
        ev.preventDefault();
        ev.stopPropagation();
        openNotification(this.dataset.message);
      });
    }

    // Long-press to edit
    div.addEventListener('pointerdown', function(ev) {
      if (ev.target.closest('button, input, select, textarea, a')) return;
      var apt = this.getAttribute('data-card');
      longPressTimer = setTimeout(function() { openEdit(apt); }, 600);
    });
    div.addEventListener('pointerup', function() { clearTimeout(longPressTimer); });
    div.addEventListener('pointermove', function() { clearTimeout(longPressTimer); });
    div.addEventListener('pointercancel', function() { clearTimeout(longPressTimer); });
    div.addEventListener('pointerleave', function() { clearTimeout(longPressTimer); });

    el.appendChild(div);
  });
}

function aptFloor(apt) {
  if (/^\d+$/.test(apt) && apt.length > 2) return apt.slice(0, apt.length - 2);
  return null;
}

function statCard(label, val, sub, valCls, subCls, rem) {
  return '<div class="stat-card"><div class="stat-label">' + label + '</div>' +
    '<div class="stat-val ' + (valCls||'') + '">' + val + '</div>' +
    '<div class="stat-sub ' + (subCls||'') + '">' + sub + '</div>' +
    (rem ? '<div class="stat-sub c-red">' + rem + '</div>' : '') +
    '</div>';
}

function progRow(label, pct, cls) {
  return '<div class="prog-row">' +
    '<div class="prog-header"><span>' + label + '</span><span class="prog-pct">' + pct + '%</span></div>' +
    '<div class="prog-track"><div class="prog-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
    '</div>';
}

function eLabel(s) {
  var m = { paid: '✓ Electricity' };
  return m[s] || '⚡ Electricity';
}
function rLabel(s) {
  var m = { paid: '✓ Rent', deposit: '⟳ Deposit', late: '⏰ Late', prepaid: '🟢 Prepaid' };
  return m[s] || '🏢 Rent';
}

(function() {
  var startY = 0, pulling = false;
  var ptr = document.getElementById('ptrIndicator');
  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 60) { ptr.innerHTML = '<span class="ptr-spin">⟳</span> Թ. թ...'; ptr.classList.add('active'); }
  }, { passive: true });
  document.addEventListener('touchend', function() {
    if (ptr.classList.contains('active')) {
      ptr.classList.remove('active');
      refreshAll();
    }
    pulling = false;
    ptr.innerHTML = '';
  });
})();

/* ═══════════════════════════════════════════════
   METER INPUT TAB
═══════════════════════════════════════════════ */
// Drafts are isolated by month so switching months never carries readings over.
var meterDraft = {};
var TARIFF_DAY   = 54;
var TARIFF_NIGHT = 45;

function calcMeterAmounts(t1prev, t2prev, t1cur, t2cur) {
  var totalPrevious = (Number(t1prev) || 0) + (Number(t2prev) || 0);
  var kwhDay   = Math.max(0, (Number(t1cur)  || 0) - (Number(t1prev) || 0));
  var kwhNight = Math.max(0, (Number(t2cur)  || 0) - (Number(t2prev) || 0));
  var amdDay   = Math.round(kwhDay   * TARIFF_DAY);
  var amdNight = Math.round(kwhNight * TARIFF_NIGHT);
  var amdTotal = amdDay + amdNight;
  return { totalPrevious: totalPrevious, kwhDay: kwhDay, kwhNight: kwhNight, amdDay: amdDay, amdNight: amdNight, amdTotal: amdTotal };
}

function meterText(value) {
  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function meterValue(value) {
  return value === undefined || value === null || value === 0 ? '' : value;
}

function meterMonthIndex(month) {
  var parts = String(month || '').split('-');
  var idx = MONTH_NAMES.indexOf(parts[0]);
  var year = Number(parts[1]);
  return idx < 0 || !year ? null : year * 12 + idx;
}

function meterReading(apt, month) {
  return elecMap[String(month || '') + '_' + officeKey(apt)] || null;
}

function meterBaseline(apt, month) {
  var existing = meterReading(apt, month);
  if (existing) {
    return {
      t1: Number(existing.t1prev) || 0,
      t2: Number(existing.t2prev) || 0,
      month: existing.previousMonth || prevMonthLabel(month),
      serial: existing.serial || '',
      assumed: !!existing.previousAssumed
    };
  }

  var targetIndex = meterMonthIndex(month);
  var best = null;
  Object.keys(elecMap).forEach(function(key) {
    if (key.indexOf('_') === -1) return;
    var row = elecMap[key];
    if (!row || officeKey(row.apt) !== officeKey(apt)) return;
    var rowIndex = meterMonthIndex(row.month);
    if (rowIndex === null || targetIndex === null || rowIndex >= targetIndex) return;
    if (!best || rowIndex > best.index) best = { index: rowIndex, row: row };
  });

  if (!best) return { t1: 0, t2: 0, month: 'No previous reading', serial: '', assumed: true };
  return {
    t1: Number(best.row.t1current) || 0,
    t2: Number(best.row.t2current) || 0,
    month: best.row.month,
    serial: best.row.serial || '',
    assumed: best.index !== targetIndex - 1
  };
}

function buildMeterMonthSelector() {
  var sel = document.getElementById('meterMonthSel');
  var choices = {};
  var now = new Date();
  for (var offset = -18; offset <= 1; offset++) {
    var d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    choices[MONTH_NAMES[d.getMonth()] + '-' + d.getFullYear()] = true;
  }
  availableMonths.forEach(function(month) { if (meterMonthIndex(month) !== null) choices[month] = true; });
  if (!meterMonth) meterMonth = elecMonth;
  choices[meterMonth] = true;

  sel.innerHTML = '';
  Object.keys(choices).sort(function(a, b) {
    return meterMonthIndex(b) - meterMonthIndex(a);
  }).forEach(function(month) {
    var option = document.createElement('option');
    option.value = month;
    option.textContent = month;
    option.selected = month === meterMonth;
    sel.appendChild(option);
  });
}

function changeMeterMonth(month) {
  meterMonth = month;
  renderMeterPanel();
}

function renderMeterPanel() {
  document.getElementById('meterPanel').style.display = '';
  document.getElementById('mainWrap').querySelector('.sort-bar').style.display = 'none';
  document.getElementById('statsGrid').style.display = 'none';
  var progPanel = document.getElementById('progPanel');
  if (progPanel) progPanel.style.display = 'none';
  var chartPanel = document.getElementById('chartPanel');
  if (chartPanel) chartPanel.style.display = 'none';
  document.getElementById('reportToggle').style.display = 'none';
  document.getElementById('list').style.display = 'none';
  buildMeterMonthSelector();

  var container = document.getElementById('meterList');
  if (!tenants.length) {
    container.innerHTML = '<div class="meter-empty">Վարձակալներ չկան</div>';
    return;
  }

  var html = '<div class="electricity-grid">';
  tenants.forEach(function(t) {
    var ex = meterReading(t.apt, meterMonth) || {};
    var draftKey = meterMonth + '_' + t.apt;
    var dr = meterDraft[draftKey] || {};
    var baseline = meterBaseline(t.apt, meterMonth);
    var t1prev = baseline.t1;
    var t2prev = baseline.t2;
    var t1cur  = dr.t1current !== undefined ? dr.t1current : (ex.t1current || '');
    var t2cur  = dr.t2current !== undefined ? dr.t2current : (ex.t2current || '');
    var calc   = calcMeterAmounts(t1prev, t2prev, t1cur, t2cur);
    var hasSaved = ex.amdDay !== undefined || ex.t1current !== undefined;
    var serial = ex.serial || baseline.serial || '-';
    var previous = 'T1 ' + fmt(t1prev) + ' · T2 ' + fmt(t2prev);

    html +=
      '<article class="electricity-card" id="mrow-' + meterText(t.apt) + '">' +
        '<div class="electricity-card-head">' +
          '<div><div class="electricity-office">' + meterText(t.apt) + '</div>' +
          '<div class="electricity-name">' + meterText(t.name || '-') + '</div></div>' +
          '<span class="meter-saved-badge' + (hasSaved ? ' show' : '') + '" id="mbadge-' + meterText(t.apt) + '">saved</span>' +
        '</div>' +
        '<div class="electricity-context">' +
          '<span>Serial ' + meterText(serial) + '</span>' +
          '<span>Previous · ' + meterText(previous) + '</span>' +
        '</div>' +
        '<div class="electricity-inputs">' +
          '<div class="electricity-field"><label>T1 day</label><input type="number" inputmode="decimal" step="0.01" min="' + meterText(t1prev) + '" value="' + meterText(meterValue(t1cur)) + '" id="mt1cur-' + meterText(t.apt) + '" oninput="meterInputChange(\'' + meterText(t.apt) + '\')"></div>' +
          '<div class="electricity-field"><label>T2 night</label><input type="number" inputmode="decimal" step="0.01" min="' + meterText(t2prev) + '" value="' + meterText(meterValue(t2cur)) + '" id="mt2cur-' + meterText(t.apt) + '" oninput="meterInputChange(\'' + meterText(t.apt) + '\')"></div>' +
        '</div>' +
        '<div class="electricity-card-foot">' +
          '<div><div class="electricity-result-label">Usage</div>' +
          '<div class="electricity-result-usage" id="musage-' + meterText(t.apt) + '">T1 ' + fmt(calc.kwhDay) + ' · T2 ' + fmt(calc.kwhNight) + ' kWh</div>' +
          '<div class="electricity-result-total" id="mtotal-' + meterText(t.apt) + '">' + (calc.amdTotal ? fmt(calc.amdTotal) + ' \u058F' : '—') + '</div></div>' +
          '<button class="electricity-save" id="msave-' + meterText(t.apt) + '" onclick="saveSingleMeter(\'' + meterText(t.apt) + '\')">Save</button>' +
        '</div>' +
      '</article>';
  });
  html += '</div>';
  container.innerHTML = html;
  updateMeterSummary();
}

function updateMeterSummary() {
  var total = 0, entered = 0, saved = 0;
  tenants.forEach(function(t) {
    var t1 = document.getElementById('mt1cur-' + t.apt);
    var t2 = document.getElementById('mt2cur-' + t.apt);
    var ex = meterReading(t.apt, meterMonth) || {};
    if (ex.t1current !== undefined) saved++;
    if (!t1 || !t2 || t1.value === '' || t2.value === '') return;
    var baseline = meterBaseline(t.apt, meterMonth);
    var calc = calcMeterAmounts(baseline.t1, baseline.t2, t1.value, t2.value);
    total += calc.amdTotal;
    entered++;
  });
  var totalEl = document.getElementById('meterSummaryTotal');
  var metaEl = document.getElementById('meterSummaryMeta');
  if (totalEl) totalEl.textContent = fmt(total) + ' \u058F';
  if (metaEl) metaEl.textContent = entered + ' entered · ' + saved + ' saved';
}

function hideMeterPanel() {
  document.getElementById('meterPanel').style.display = 'none';
  document.getElementById('mainWrap').querySelector('.sort-bar').style.display = '';
  document.getElementById('statsGrid').style.display = '';
  document.getElementById('reportToggle').style.display = '';
  document.getElementById('list').style.display = '';
}

function meterInputChange(apt) {
  var t1Input = document.getElementById('mt1cur-' + apt);
  var t2Input = document.getElementById('mt2cur-' + apt);
  var t1cur = t1Input ? t1Input.value : '';
  var t2cur = t2Input ? t2Input.value : '';
  var baseline = meterBaseline(apt, meterMonth);
  meterDraft[meterMonth + '_' + apt] = { t1current: t1cur, t2current: t2cur };
  var calc = calcMeterAmounts(baseline.t1, baseline.t2, t1cur, t2cur);
  var belowPrevious =
    (t1cur !== '' && Number(t1cur) < baseline.t1) ||
    (t2cur !== '' && Number(t2cur) < baseline.t2);
  function setEl(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; }
  setEl('musage-' + apt, belowPrevious ? '⚠ Below previous reading' : ('T1 ' + fmt(calc.kwhDay) + ' · T2 ' + fmt(calc.kwhNight) + ' kWh'));
  setEl('mtotal-'     + apt, calc.amdTotal ? fmt(calc.amdTotal) + ' \u058F' : '—');
  if (t1Input) t1Input.classList.add('dirty');
  if (t2Input) t2Input.classList.add('dirty');
  updateMeterSummary();
}

function saveSingleMeter(apt) {
  var t = tenants.find(function(x) { return x.apt === apt; });
  if (!t) return;
  var t1El = document.getElementById('mt1cur-' + apt);
  var t2El = document.getElementById('mt2cur-' + apt);
  var t1raw = t1El ? t1El.value.trim() : '';
  var t2raw = t2El ? t2El.value.trim() : '';
  if (t1raw === '' || t2raw === '') {
    toast('Enter both T1 and T2 for ' + apt, 'error');
    return;
  }
  var t1cur = Number(t1raw);
  var t2cur = Number(t2raw);
  var month = meterMonth;
  var btn    = document.getElementById('msave-' + apt);
  if (btn) { btn.textContent = '\u23F3 ...'; btn.classList.add('saving'); }
  var url = API + '?action=saveMeter' +
    '&apt=' + encodeURIComponent(apt) + '&month=' + encodeURIComponent(month) +
    '&t1current=' + t1cur + '&t2current=' + t2cur +
    '&internet=' + (t.internet ? 'yes' : 'no');
  jsonpRetry(url, 2).then(function(res) {
    if (btn) { btn.textContent = 'Save'; btn.classList.remove('saving'); }
    if (res && res.ok) {
      elecMap[month + '_' + apt] = {
        apt: apt, month: month, serial: res.serial || '',
        t1prev: res.t1prev, t2prev: res.t2prev, t1current: t1cur, t2current: t2cur,
        totalPrevious: res.totalPrevious,
        kwhDay: res.kwhDay || 0, kwhNight: res.kwhNight || 0,
        amdDay: res.amdDay || 0, amdNight: res.amdNight || 0,
        amdTotal: res.amdTotal || ((res.amdDay || 0) + (res.amdNight || 0)),
        internet: t.internet, previousMonth: res.previousMonth || '',
        previousAssumed: !!res.previousAssumed
      };
      ['mt1cur-','mt2cur-'].forEach(function(pfx) {
        var el = document.getElementById(pfx + apt); if (el) el.classList.remove('dirty');
      });
      delete meterDraft[month + '_' + apt];
      var badge = document.getElementById('mbadge-' + apt);
      if (badge) badge.classList.add('show');
      toast('\u2713 ' + apt + ' \u00B7 ' + fmt(res.amdTotal || 0) + ' \u058F', 'success');
      renderMeterPanel();
    } else { toast((res && res.error) || ('Save failed: ' + apt), 'error'); }
  }).catch(function() {
    if (btn) { btn.textContent = 'Save'; btn.classList.remove('saving'); }
    toast('Connection failed: ' + apt, 'error');
  });
}

function saveAllMeters() {
  var month = meterMonth;
  var btn = document.querySelector('.meter-save-all-btn');
  if (btn) { btn.textContent = '\u23F3 ...'; btn.disabled = true; }
  var chain = Promise.resolve(); var savedCount = 0; var failedCount = 0;
  tenants.forEach(function(t) {
    chain = chain.then(function() { return new Promise(function(res) {
      var t1El = document.getElementById('mt1cur-' + t.apt);
      var t2El = document.getElementById('mt2cur-' + t.apt);
      var t1raw = t1El ? t1El.value.trim() : '';
      var t2raw = t2El ? t2El.value.trim() : '';
      if (t1raw === '' && t2raw === '') { res(); return; }
      if (t1raw === '' || t2raw === '') { failedCount++; res(); return; }
      var t1cur = Number(t1raw);
      var t2cur = Number(t2raw);
      var url = API + '?action=saveMeter' +
        '&apt=' + encodeURIComponent(t.apt) + '&month=' + encodeURIComponent(month) +
        '&t1current=' + t1cur + '&t2current=' + t2cur +
        '&internet=' + (t.internet ? 'yes' : 'no');
      jsonpRetry(url, 2).then(function(r) {
        if (r && r.ok) {
          elecMap[month + '_' + t.apt] = {
            apt: t.apt, month: month, serial: r.serial || '',
            t1prev: r.t1prev, t2prev: r.t2prev, t1current: t1cur, t2current: t2cur,
            totalPrevious: r.totalPrevious,
            kwhDay: r.kwhDay||0, kwhNight: r.kwhNight||0,
            amdDay: r.amdDay||0, amdNight: r.amdNight||0,
            amdTotal: r.amdTotal || ((r.amdDay || 0) + (r.amdNight || 0)),
            internet: t.internet, previousMonth: r.previousMonth || '',
            previousAssumed: !!r.previousAssumed
          };
          savedCount++;
          delete meterDraft[month + '_' + t.apt];
        } else failedCount++;
        res();
      }).catch(function() { failedCount++; res(); });
    }); });
  });
  chain.then(function() {
    if (btn) { btn.textContent = 'Save entered'; btn.disabled = false; }
    renderMeterPanel();
    toast('\u2713 Saved ' + savedCount + (failedCount ? ' · failed ' + failedCount : ''), failedCount ? 'error' : 'success');
  });
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var secondsAway = lastSyncTime ? (Date.now() - lastSyncTime) / 1000 : Infinity;
    // Only re-fetch if away for more than 2 minutes — avoids refresh on quick tab switches
    if (secondsAway > 120) refreshAll();
  }
});

/* Safety-net background refresh every 10 minutes — far less intrusive */
setInterval(function() { if (document.visibilityState === 'visible') refreshAll(); }, 600000);

/* Keep the "X min ago" label ticking */
setInterval(function() {
  if (lastSyncTime) document.getElementById('lastSync').textContent = timeAgo(lastSyncTime);
